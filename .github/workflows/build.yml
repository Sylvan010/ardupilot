name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Factory-Level 4.6.3 Verification
        run: |
          echo "Running hardened factory-safe validation..."
          
          # Надійний пошук папки плати без чутливості до мінорних колізій регістру у find
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -type d -name "SpeedyBeeF4V3" -o -name "speedybeef4v3" | head -n1)
          HWDEF_PATH=$HWDEF_DIR/hwdef.dat
          echo "Found hwdef target path: $HWDEF_PATH"
          
          if [ -z "$HWDEF_PATH" ] || [ ! -f "$HWDEF_PATH" ]; then
            echo "Error: Target hwdef.dat not found in repository structure!"
            exit 1
          fi

          # Сувора промислова верифікація рантайм-токенів під нову структуру
          grep -q "AP_HW_SPEEDYBEEF4V3" "$HWDEF_PATH" || exit 1
          grep -q "SerialProtocol_CRSF" "$HWDEF_PATH" || exit 1
          grep -q "define AP_NAV_EKF3_ENABLED 1" "$HWDEF_PATH" || exit 1
          grep -q "define STM32_ST_USE_TIMER 5" "$HWDEF_PATH" || exit 1
          grep -q "PC12 UART5_TX UART5 NODMA" "$HWDEF_PATH" || exit 1
          grep -q "IMU Invensense" "$HWDEF_PATH" || exit 1
          
          echo "Factory-level validation PASSED."

      - name: Compile Firmware inside Docker (ArduPilot 4.6.3 Isolated Environment)
        run: |
          # Автоматичне визначення точного імені папки плати без колізій бекіпів
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -type d -name "SpeedyBeeF4V3" -o -name "speedybeef4v3" | head -n1)
          BOARD_TARGET=$(basename "$HWDEF_DIR")
          echo "Compiling firmware for board target: $BOARD_TARGET"
          
          # Запуск збірки строго всередині контейнера версії 4.6.3 із перенаправленням логів лінкера в файл за вашою схемою
          docker run --rm -v ${{ github.workspace }}:/ardupilot -w /ardupilot ardupilot/ardupilot-dev-chibios:4.6.3 /bin/bash -c "
            git config --global --add safe.directory '*' && \
            rm -rf build && \
            ./waf distclean && \
            ./waf configure --board $BOARD_TARGET && \
            ./waf copter -v 2>&1 | tee build.log
          "

      - name: Upload Target Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-4.6.3
          path: |
            build/**/bin/arducopter.apj
            build/**/bin/arducopter.hex

      - name: Upload Linker Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-debug-log
          path: build.log
