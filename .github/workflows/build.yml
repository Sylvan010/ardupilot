name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Hard reset target cache
        run: |
          rm -rf build

      - name: Verify hwdef real source
        run: |
          echo "===== HWDEF REAL SOURCE CHECK ====="
          grep -nE "PC4.*(GYRO_INT|IMU_INT)" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat || true

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify scripting disabled
        run: |
          echo "===== SCRIPT CHECK ====="
          grep -Rni "AP_SCRIPTING_ENABLED" build/MatekF405-TE/ || true

      - name: Verify LED mapping
        run: |
          echo "===== LED MAP CHECK ====="
          grep -Rni "PC15" build/MatekF405-TE || true
          grep -Rni "PC14" build/MatekF405-TE || true

      - name: Verify IMU interrupt
        run: |
          echo "===== GYRO INT CHECK ====="
          grep -Rni "PC4" build/MatekF405-TE || true
          grep -Rni "EXTI" build/MatekF405-TE || true

      - name: Verify generated hwdef
        run: |
          echo "===== GENERATED HWDEF CHECK ====="
          test -f build/MatekF405-TE/hwdef.h
          grep -Rni "HAL_EXTI_ENABLED" build/MatekF405-TE || true

      - name: Dump critical pins configuration
        run: |
          echo "===== CRITICAL PIN DUMP ====="
          grep -Rni "LED\|PC14\|PC15\|PC4\|EXTI" build/MatekF405-TE || true

      - name: Build ArduCopter Firmware
        shell: bash
        run: |
          touch build.log
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          if [ -f build.log ]; then
            grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
            echo "===== LAST 200 LINES OF BUILD LOG ====="
            tail -n 200 build.log
          else
            echo "ERROR: build.log was not created. Waf failed on early steps."
          fi

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          
          # Динамический поиск бинарников в папке сборки
          APJ_PATH=$(find build/ -name "arducopter.apj" | head -n 1)
          HEX_PATH=$(find build/ -name "arducopter.hex" | head -n 1)
          ELF_PATH=$(find build/ -name "arducopter.elf" | head -n 1)

          if [ -z "$APJ_PATH" ] || [ -z "$HEX_PATH" ]; then
            echo "ERROR: Compiled firmware files (.apj/.hex) not found!"
            exit 1
          fi

          echo "Found APJ at: $APJ_PATH"
          echo "Found HEX at: $HEX_PATH"

          # Размер финального эльфа
          arm-none-eabi-size "$ELF_PATH"

          # Изолируем артефакты и присваиваем им кастомное имя под плату HAKRC
          mkdir -p output_artifacts
          cp "$APJ_PATH" output_artifacts/HAKRC_F405V2_ArduCopter.apj
          cp "$HEX_PATH" output_artifacts/HAKRC_F405V2_ArduCopter.hex
          
          BL_HEX_PATH=$(find build/ -name "arducopter_with_bl.hex" | head -n 1)
          if [ ! -z "$BL_HEX_PATH" ]; then
            cp "$BL_HEX_PATH" output_artifacts/HAKRC_F405V2_ArduCopter_with_BL.hex
          fi

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-Firmware
          path: output_artifacts/
