name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/**'

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest

    container:
      image: ardupilot/ardupilot-dev-chibios:latest


    steps:


      - name: Checkout Repository

        uses: actions/checkout@v4

        with:
          submodules: recursive



      - name: Configure git

        run: |

          git config --global --add safe.directory $GITHUB_WORKSPACE



      - name: Clean build

        run: |

          rm -rf build

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2



      - name: Check HWDEF exists

        shell: bash

        run: |

          echo "===== HWDEF LOCATION ====="

          pwd

          ls -la libraries/AP_HAL_ChibiOS/hwdef/


          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          echo "===== HWDEF FOUND ====="



      - name: Show hardware mapping

        shell: bash

        run: |

          echo "===== BOARD ====="

          grep APJ_BOARD_ID \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true



          echo "===== SPI1 IMU ====="

          grep SPI1 \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true



          echo "===== MAX7456 OSD ====="

          grep OSD \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true



          echo "===== DATAFLASH ====="

          grep FLASH \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true



          echo "===== LED ====="

          grep LED \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true



      - name: Configure ArduPilot

        shell: bash

        run: |

          ./waf configure \
          --board FoxeerF405v2



      - name: Verify generated board

        shell: bash

        run: |

          echo "===== GENERATED FILES ====="


          test -f build/FoxeerF405v2/hwdef.h


          grep APJ_BOARD_ID \
          build/FoxeerF405v2/hwdef.h || true




      - name: Build ArduCopter

        shell: bash

        run: |


          touch build.log


          set +e


          ./waf copter -v 2>&1 | tee build.log


          RESULT=${PIPESTATUS[0]}


          set -e


          exit $RESULT




      - name: Build error report

        if: failure()

        shell: bash

        run: |

          echo "===== BUILD FAILED ====="


          if [ -f build.log ]; then

            tail -200 build.log

          else

            echo "build.log missing"

          fi




      - name: Firmware check

        shell: bash

        run: |

          echo "===== FIRMWARE CHECK ====="


          test -f build/FoxeerF405v2/bin/arducopter.apj


          echo "=========================="

          echo " HAKRC F405 V2 BUILD OK "

          echo "=========================="




      - name: Upload Firmware

        uses: actions/upload-artifact@v4

        with:


          name: HAKRC-F405V2-ArduCopter


          path: |

            build/FoxeerF405v2/bin/arducopter.apj

            build/FoxeerF405v2/bin/arducopter_with_bl.hex


          if-no-files-found: error
