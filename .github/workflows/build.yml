name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Hardware-Valid Verification
        run: |
          echo "Running structural safety verification..."
          # 1. Проверка синтаксиса прерывания гироскопа (Строго PB10, никаких B10)
          grep -q "PB10 GYRO1_EXTI" libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat || exit 1
          # 2. Проверка аппаратной привязки шины UART5 (Без опечаток типа USART5)
          grep -q "PC12 UART5_TX UART5" libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat || exit 1
          # 3. Проверка чистоты файла от нестабильной директивы DMA_NOSHARE
          if grep -q "DMA_NOSHARE" libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat; then echo "Error: Unstable DMA_NOSHARE found!"; exit 1; fi
          echo "Factory-level validation PASSED."

      - name: Compile Firmware inside Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/ardupilot -w /ardupilot ardupilot/ardupilot-dev-base:latest /bin/bash -c "
            git config --global --add safe.directory /ardupilot && \
            ./waf configure --board SpeedyBeeF4v3 && \
            ./waf copter
          "

      - name: Upload Target Artifacts
        uses: actions/artifacts@v4
        with:
          name: Factory-SpeedyBeeF4v3-Release
          path: |
            build/SpeedyBeeF4v3/bin/arducopter.apj
            build/SpeedyBeeF4v3/bin/arducopter.hex
