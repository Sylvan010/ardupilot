name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Factory-Level 4.6.3 Verification
        run: |
          echo "Running hardened factory-safe validation..."
          
          # Надежный пошаговый поиск папки платы с флагом -iname без коллизий по -o операторам
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -type d -iname "SpeedyBeeF4V3" -print -quit)
          HWDEF_PATH=$HWDEF_DIR/hwdef.dat
          echo "Found hwdef target path: $HWDEF_PATH"
          
          if [ -z "$HWDEF_PATH" ] || [ ! -f "$HWDEF_PATH" ]; then
            echo "Error: Target hwdef.dat not found in repository structure!"
            exit 1
          fi

          # Сувора промислова верифікація рантайм-токенів під нову структуру
          grep -q "AP_HW_SPEEDYBEEF4V3" "$HWDEF_PATH" || exit 1
          grep -q "SerialProtocol_CRSF" "$HWDEF_PATH" || exit 1
          grep -q "define AP_NAV_EKF3_ENABLED 1" "$HWDEF_PATH" || exit 1
          grep -q "define STM32_ST_USE_TIMER 5" "$HWDEF_PATH" || exit 1
          grep -q "PC12 UART5_TX UART5 NODMA" "$HWDEF_PATH" || exit 1
          grep -Eq "IMU Invensense(v3)? SPI:imu0" "$HWDEF_PATH" || exit 1
          grep -q "define AP_COMPASS_PROBING_ENABLED 0" "$HWDEF_PATH" || exit 1
          
          echo "Factory-level validation PASSED."

      - name: Compile Firmware inside Docker (ArduPilot ChibiOS Environment)
        run: |
          # 1. Тотальный аудит дерева каталогов hwdef в консоль перед стартом контейнера
          echo "===== REPOSITORY HWDEF PATH TREE ====="
          find libraries/AP_HAL_ChibiOS/hwdef -maxdepth 2 -iname "*speedy*" -print || true
          
          # 2. Автоматическое определение имени папки платы и принудительный перевод в нижний регистр (lowercase)
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -type d -iname "SpeedyBeeF4V3" -print -quit)
          if [ -z "$HWDEF_DIR" ]; then echo "ERROR: hwdef directory not found"; exit 1; fi

          RAW_TARGET=$(basename "$HWDEF_DIR")
          BOARD_TARGET=$(echo "$RAW_TARGET" | tr '[:upper:]' '[:lower:]')
          
          echo "===== RESOLVED TARGET LOGIC ====="
          echo "BOARD_TARGET=$BOARD_TARGET"
          
          # Запуск сборки с использованием современной команды --target bin/arducopter и разделением через ';'
          docker run --rm -v ${{ github.workspace }}:/ardupilot -w /ardupilot ardupilot/ardupilot-dev-chibios:latest /bin/bash -c "
            git config --global --add safe.directory '*' ; \
            rm -rf build ; \
            ./waf distclean || true ; \
            echo '===== BOARD CHECK =====' ; \
            ./waf list_boards | grep -i speedy || true ; \
            echo '===== CONFIGURE =====' ; \
            ./waf configure --board $BOARD_TARGET --ram-fraction=0.3 ; \
            echo '===== BUILD COPTER =====' ; \
            ./waf build --target bin/arducopter -j 1 -v 2>&1 | tee /ardupilot/build.log ; \
            echo '===== OUTPUT =====' ; \
            find build -name '*.apj' -o -name '*.hex' || true
          "

      - name: Upload Target Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-4.6.3
          path: |
            build/**/bin/arducopter.apj
            build/**/bin/arducopter.hex

      - name: Upload Linker Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linker-debug-log
          path: build.log
