- name: Inject HAKRC hwdef
  run: |
    rm -rf libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3
    mkdir -p libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3

    if [ ! -d hwdef/HAKRCF405V2 ]; then
      echo "ERROR: hwdef/HAKRCF405V2 folder missing!"
      ls -R
      exit 1
    fi

    cp -r hwdef/HAKRCF405V2/* libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3/
