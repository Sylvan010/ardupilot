name: Build ArduPilot Production DFU for HAKRC F405 V2

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-22.04

    steps:
      # 1. Скачивание репозитория
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 2. Устранение ошибки safe.directory
      - name: Configure Git Safe Directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global --add safe.directory /github/workspace

      # 3. Зависимости компилятора
      - name: Install Toolchain and Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-setuptools python3-wheel gcc-arm-none-eabi libncurses5 lzma

      # 4. Конфигурация под ПРАВИЛЬНУЮ плату (теперь она будет брать данные из hwdef/HAKRC_F405/)
      - name: Configure Waf Board Target
        run: |
          ./waf configure --board HAKRC_F405

      # 5. Сборка прошивки
      - name: Compile ArduCopter Firmware
        run: |
          ./waf copter

      # 6. Выгрузка собранного .hex файла (так как бутлоадера нет, шьем плату в режиме DFU)
      - name: Upload Compiled Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC_F405_V2_Production_DFU
          path: build/HAKRC_F405/bin/arducopter.hex
