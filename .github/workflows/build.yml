name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache ArduPilot build
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            build
          key: hakrc-f405v2-matekf405-${{ github.sha }}
          restore-keys: |
            hakrc-f405v2-matekf405-

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Clean target cache
        run: |
          rm -rf build/MatekF405-TE

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify generated hwdef
        run: |
          grep "HAL_GPIO_PIN_70" build/MatekF405-TE/hwdef.h
          grep "TIM3_CH4" build/MatekF405-TE/hwdef.h
          grep "HAL_GPIO_A_LED_PIN" build/MatekF405-TE/hwdef.h

      - name: Dump generated pins
        run: |
          grep "HAL_GPIO_PIN_" build/MatekF405-TE/hwdef.h | head -50

      - name: Build ArduCopter Firmware
        run: |
          ./waf copter

      - name: Verify firmware memory
        run: |
          arm-none-eabi-size --format=berkeley build/MatekF405-TE/bin/arducopter.elf

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-Firmware
          path: |
            build/MatekF405-TE/bin/arducopter.apj
            build/MatekF405-TE/bin/arducopter.hex
            build/MatekF405-TE/bin/arducopter_with_bl.hex
