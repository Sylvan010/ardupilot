name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/**'

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest


    container:

      image: ardupilot/ardupilot-dev-chibios:latest



    steps:


      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          submodules: recursive



      - name: Configure git

        run: |

          git config --global --add safe.directory $GITHUB_WORKSPACE



      - name: Clean old builds

        run: |

          rm -rf build

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2



      - name: Verify HAKRC HWDEF

        shell: bash

        run: |

          echo "===== HWDEF CHECK ====="


          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "APJ_BOARD_ID AP_HW_HAKRC_F405" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat



          echo "===== SPI OSD CHECK ====="


          grep "PB12.*OSD_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB13.*SPI2" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB14.*SPI2" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB15.*SPI2" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat



          echo "===== FLASH CHECK ====="


          grep "PA15.*FLASH_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PC10.*SPI3" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PC11.*SPI3" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB5.*SPI3" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat



          echo "===== LED CHECK ====="


          grep "PC14.*LED" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat




      - name: Show HWDEF

        run: |

          head -120 libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat




      - name: Configure Firmware

        shell: bash

        run: |


          ./waf configure \
          --board FoxeerF405v2




      - name: Verify generated files

        shell: bash

        run: |


          echo "===== GENERATED HWDEF ====="


          test -f build/FoxeerF405v2/hwdef.h


          grep APJ_BOARD_ID \
          build/FoxeerF405v2/hwdef.h



      - name: Build ArduCopter

        shell: bash

        run: |


          touch build.log


          set +e


          ./waf copter -v 2>&1 | tee -a build.log


          status=${PIPESTATUS[0]}


          set -e


          exit $status




      - name: Dump build failure

        if: failure()

        shell: bash

        run: |


          echo "===== BUILD FAILED ====="


          if [ -f build.log ]; then

            echo "===== LAST 200 LINES ====="

            tail -200 build.log

          else

            echo "NO BUILD LOG CREATED"

          fi



          echo "===== DIRECTORY ====="

          ls -la

          ls -la build || true




      - name: Verify Firmware

        shell: bash

        run: |


          echo "===== FINAL CHECK ====="


          test -f build/FoxeerF405v2/bin/arducopter.apj


          echo "HAKRC F405 V2 BUILD OK"




      - name: Upload Firmware

        uses: actions/upload-artifact@v4


        with:


          name: HAKRC-F405V2-ArduCopter


          path: |

            build/FoxeerF405v2/bin/arducopter.apj

            build/FoxeerF405v2/bin/arducopter_with_bl.hex


          if-no-files-found: error
