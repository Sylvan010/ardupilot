name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Clean build
        run: |
          rm -rf build

      - name: Check HWDEF exists
        shell: bash
        run: |
          echo "===== HWDEF LOCATION ====="
          pwd
          ls -la libraries/AP_HAL_ChibiOS/hwdef/
          test -f libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/hwdef.dat
          test -f libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/hwdef-bl.dat
          test -f libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/defaults.parm
          echo "===== HWDEF FOUND ====="

      - name: Pre-build Isolated Bootloader (ОБХОД ОШИБКИ MAVGEN)
        run: |
          echo "===== GENERATING BOOTLOADER DIRECTLY VIA PYTHON ====="
          python3 Tools/scripts/build_bootloaders.py HAKRCF405V2
          
          echo "===== INJECTING BL BINARY INTO ARDUPILOT DIRECTORY ====="
          mkdir -p Tools/bootloaders
          cp build/HAKRCF405V2/bootloader/HAKRCF405V2_bl.bin Tools/bootloaders/HAKRCF405V2_bl.bin
          
          echo "===== BL BINARY VERIFICATION ====="
          test -f Tools/bootloaders/HAKRCF405V2_bl.bin
          ls -la Tools/bootloaders/

      - name: Configure Waf Build System For Main Firmware
        run: |
          ./waf configure --board HAKRCF405V2

      - name: Verify configured board
        run: |
          echo "===== BOARD CHECK ====="
          test -d build/HAKRCF405V2
          test -f build/HAKRCF405V2/hwdef.h

      - name: Verify generated board identity
        run: |
          echo "===== HWDEF BOARD ID ====="
          grep -R "APJ_BOARD_ID" build/HAKRCF405V2/
          grep -R -E "^#define[[:space:]]+APJ_BOARD_ID[[:space:]]+1157[[:space:]]*$" build/HAKRCF405V2/ || exit 1

      - name: Verify SPI physical mapping
        run: |
          echo "===== SPI GPIO CHECK ====="
          grep -Rni "PB12" build/HAKRCF405V2/hwdef.h
          grep -Rni "PA4" build/HAKRCF405V2/hwdef.h

      - name: Build ArduCopter Main Firmware
        shell: bash
        run: |
          touch build.log
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS}
          set -e
          exit $status

      - name: Inspect build output tree
        if: always()
        run: |
          echo "===== REVEALING ACTUAL BUILD OUTPUT TREE ====="
          find build/HAKRCF405V2 -maxdepth 4 -type f | grep -E "arducopter|\.elf|\.apj|\.hex" || true

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          if [ -f build.log ]; then
            grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
            tail -n 200 build.log
          else
            echo "ERROR: build.log was not created."
          fi

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          test -f build/HAKRCF405V2/bin/arducopter.apj
          test -f build/HAKRCF405V2/bin/arducopter
          test -f build/HAKRCF405V2/bin/arducopter_with_bl.hex
          
          arm-none-eabi-size build/HAKRCF405V2/bin/arducopter
          
          echo "=================================="
          echo "    HAKRC F405 V2 BUILD OK "
          echo "=================================="

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-Production-Firmware
          path: |
            build/HAKRCF405V2/bin/arducopter.apj
            build/HAKRCF405V2/bin/arducopter_with_bl.hex
          if-no-files-found: error
