name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/**'
      - '.github/workflows/build-hakrc.yml'

  workflow_dispatch:


jobs:

  build:

    name: Build ArduCopter HAKRC F405 V2

    runs-on: ubuntu-latest


    container:
      image: ardupilot/ardupilot-dev-chibios:latest


    steps:


      # ==========================
      # SOURCE
      # ==========================

      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          submodules: recursive



      - name: Configure git

        run: |

          git config --global --add safe.directory $GITHUB_WORKSPACE



      # ==========================
      # CLEAN
      # ==========================

      - name: Clean build cache

        run: |

          rm -rf build

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2



      # ==========================
      # CHECK HWDEF
      # ==========================

      - name: Verify HAKRC hwdef

        run: |

          echo "===== HAKRC HWDEF ====="


          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "APJ_BOARD_ID AP_HW_HAKRC_F405" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PA4 GYRO_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB12 OSD_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PA15 FLASH_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PC14 LED0" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat



      # ==========================
      # CONFIGURE
      # ==========================

      - name: Configure Waf

        run: |

          ./waf configure \
          --board FoxeerF405v2



      # ==========================
      # CHECK GENERATED FILES
      # ==========================

      - name: Verify generated hwdef

        run: |

          echo "===== GENERATED HWDEF ====="


          test -f build/FoxeerF405v2/hwdef.h


          grep APJ_BOARD_ID \
          build/FoxeerF405v2/hwdef.h



      # ==========================
      # BUILD
      # ==========================

      - name: Build ArduCopter

        shell: bash

        run: |

          set +e


          ./waf copter -v 2>&1 | tee build.log


          status=${PIPESTATUS[0]}


          set -e


          exit $status



      # ==========================
      # ERROR LOG
      # ==========================

      - name: Show build error

        if: failure()

        run: |

          echo "===== BUILD FAILED ====="


          tail -200 build.log



      # ==========================
      # FIRMWARE CHECK
      # ==========================

      - name: Verify firmware

        run: |


          test -f build/FoxeerF405v2/bin/arducopter.apj


          echo "=============================="

          echo " HAKRC F405 V2 BUILD SUCCESS "

          echo "=============================="



      # ==========================
      # ARTIFACT
      # ==========================

      - name: Upload firmware

        uses: actions/upload-artifact@v4


        with:


          name: HAKRC-F405V2-ArduCopter


          path: |

            build/FoxeerF405v2/bin/arducopter.apj

            build/FoxeerF405v2/bin/arducopter

            build/FoxeerF405v2/bin/arducopter_with_bl.hex


          if-no-files-found: error
