name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Hard reset target cache
        run: |
          rm -rf build

      - name: Verify hwdef real source
        run: |
          echo "===== HWDEF REAL SOURCE CHECK ====="
          grep -nE "PC4.*(GYRO_INT|IMU_INT)" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          if grep -n "GPIO(70)" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat; then
            echo "ERROR: GPIO(70) still exists in source file!"
            exit 1
          fi

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify scripting disabled
        run: |
          echo "===== SCRIPT CHECK ====="
          grep -Rni "AP_SCRIPTING_ENABLED" build/MatekF405-TE/config.h || true

      - name: Verify LED mapping
        run: |
          echo "===== LED MAP CHECK ====="
          grep -Rni "HAL_GPIO_A_LED_PIN" build/MatekF405-TE || true
          grep -Rni "HAL_GPIO_B_LED_PIN" build/MatekF405-TE || true
          grep -Rni "HAL_GPIO_C_LED_PIN" build/MatekF405-TE || true
          grep -Rni "PC15" build/MatekF405-TE || true
          grep -Rni "PC14" build/MatekF405-TE || true

      - name: Verify LED count
        run: |
          echo "===== NOTIFY LED COUNT ====="
          grep -Rni "HAL_NOTIFY_NUM_LEDS" build/MatekF405-TE || true
          if ! grep -R "#define HAL_NOTIFY_NUM_LEDS 2" build/MatekF405-TE; then
              echo "ERROR: HAL_NOTIFY_NUM_LEDS is not 2"
              exit 1
          fi

      - name: Validate no duplicate LED definitions
        run: |
          echo "===== LED DUPLICATE CHECK ====="
          COUNT_A=$(grep -R "#define HAL_GPIO_A_LED_PIN" build/MatekF405-TE 2>/dev/null | wc -l)
          COUNT_B=$(grep -R "#define HAL_GPIO_B_LED_PIN" build/MatekF405-TE 2>/dev/null | wc -l)

          COUNT_A=${COUNT_A:-0}
          COUNT_B=${COUNT_B:-0}

          echo "LED A = $COUNT_A"
          echo "LED B = $COUNT_B"

          if [ "$COUNT_A" -gt 1 ]; then
             echo "ERROR: multiple HAL_GPIO_A_LED_PIN definitions detected!"
             exit 1
          fi

          if [ "$COUNT_B" -gt 1 ]; then
             echo "ERROR: multiple HAL_GPIO_B_LED_PIN definitions detected!"
             exit 1
          fi

      - name: Verify IMU interrupt
        run: |
          echo "===== GYRO INT CHECK ====="
          grep -Rni "PC4" build/MatekF405-TE || true
          grep -Rni "EXTI" build/MatekF405-TE || true

      - name: Verify generated hwdef
        run: |
          echo "===== GENERATED HWDEF CHECK ====="
          test -f build/MatekF405-TE/hwdef.h
          grep -Rni "HAL_EXTI_ENABLED" build/MatekF405-TE || true
          grep -Rni "TIM3" build/MatekF405-TE || true

      - name: Dump critical pins configuration
        run: |
          echo "===== CRITICAL PIN DUMP ====="
          grep -Rni "LED\|PC14\|PC15\|PC4\|EXTI" build/MatekF405-TE || true

      - name: Inspect generated ChibiOS files
        run: |
          echo "===== GENERATED FILES ====="
          find build/MatekF405-TE -maxdepth 2 -type f | sort | grep -E "hwdef|chibios|board" || true

      - name: Dump generated pins
        run: |
          echo "===== GPIO DEFINES ====="
          grep -Rni "GPIO" build/MatekF405-TE | head -100 || true
          echo "===== EXTI ====="
          grep -Rni "EXTI" build/MatekF405-TE || true
          echo "===== PWM ====="
          grep -Rni "PWM" build/MatekF405-TE | head -50 || true

      - name: Build ArduCopter Firmware
        shell: bash
        run: |
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
          echo "===== LAST 200 LINES OF BUILD LOG ====="
          tail -n 200 build.log

      - name: Show ChibiOS generated files on failure
        if: failure()
        run: |
          echo "===== hwdef components failure status ====="
          grep -Rni "PC4\|GPIO\|EXTI\|LED" build/MatekF405-TE || true
          echo "===== build errors ====="
          grep -Rni "error:" build/MatekF405-TE | head -50 || true

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          test -f build/MatekF405-TE/bin/arducopter.apj
          test -f build/MatekF405-TE/bin/arducopter.hex
          arm-none-eabi-size build/MatekF405-TE/bin/arducopter.elf

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-Firmware
          path: |
            build/MatekF405-TE/bin/arducopter.apj
            build/MatekF405-TE/bin/arducopter.hex
            build/MatekF405-TE/bin/arducopter_with_bl.hex
