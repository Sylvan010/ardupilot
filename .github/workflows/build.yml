name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Factory hwdef validation
        run: |
          echo "Running hardened hwdef validation..."

          # Стабільний покроковий пошук директорії без колізій дублікатів
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -iname "SpeedyBeeF4V3" -type d | head -n1)
          HWDEF_PATH=$HWDEF_DIR/hwdef.dat

          echo "Using target path:"
          echo "$HWDEF_PATH"

          test -f "$HWDEF_PATH" || exit 1

          # Валідація токенів сумісності під ArduPilot 4.6.3+
          grep -q "define AP_NAV_EKF3_ENABLED 1" "$HWDEF_PATH" || exit 1
          grep -q "define STM32_ST_USE_TIMER 5" "$HWDEF_PATH" || exit 1
          grep -q "IMU ICM42688" "$HWDEF_PATH" || exit 1

          echo "hwdef validation OK"

      - name: Build ArduCopter
        run: |
          # Визначення цільової плати на основі знайденої папки
          HWDEF_DIR=$(find libraries/AP_HAL_ChibiOS/hwdef/ -iname "SpeedyBeeF4V3" -type d | head -n1)
          BOARD_TARGET=$(basename "$HWDEF_DIR")

          echo "Building target board:"
          echo "$BOARD_TARGET"

          # Запуск компіляції всередині профільного ChibiOS контейнера
          docker run --rm \
            -v ${{ github.workspace }}:/ardupilot \
            -w /ardupilot \
            ardupilot/ardupilot-dev-chibios:latest \
            /bin/bash -c "
              git config --global --add safe.directory /ardupilot &&
              ./waf configure --board $BOARD_TARGET &&
              ./waf copter
            "

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-4.6.3
          path: |
            build/*/bin/arducopter.apj
            build/*/bin/arducopter.hex
