name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Hard reset target cache
        run: |
          rm -rf build

      - name: Verify hwdef real source
        run: |
          echo "===== HWDEF REAL SOURCE CHECK ====="
          grep -n "PC4" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          grep -n "GYRO_INT" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          if grep -n "GPIO(70)" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat; then
            echo "ERROR: GPIO(70) still exists in source file!"
            exit 1
          fi

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify generated hwdef
        run: |
          echo "===== GENERATED HWDEF CHECK ====="
          grep -n "GYRO_INT" build/MatekF405-TE/hwdef.h
          grep -n "GPIO(70)" build/MatekF405-TE/hwdef.h || true
          grep -n "HAL_GPIO_PIN" build/MatekF405-TE/hwdef.h | grep PC4 || true

      - name: Dump hwdef
        run: |
          sed -n '1,200p' build/MatekF405-TE/hwdef.h

      - name: Inspect generated ChibiOS files
        run: |
          echo "===== GENERATED FILES ====="
          find build/MatekF405-TE -maxdepth 2 -type f | sort | grep -E "hwdef|chibios|board" || true
          echo "===== PC4 / GYRO_INT / EXTI ====="
          grep -RniE "PC4|GYRO_INT|PAL_LINE|EXTI" build/MatekF405-TE || true

      - name: Dump generated pins
        run: |
          echo "===== GPIO DEFINES ====="
          grep -n "GPIO" build/MatekF405-TE/hwdef.h | head -100 || true
          echo "===== EXTI ====="
          grep -n "EXTI" build/MatekF405-TE/hwdef.h || true
          echo "===== PWM ====="
          grep -n "PWM" build/MatekF405-TE/hwdef.h | head -50 || true

      - name: Build ArduCopter Firmware
        shell: bash
        run: |
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected" build.log || true
          echo "===== LAST 200 LINES OF BUILD LOG ====="
          tail -n 200 build.log

      - name: Show ChibiOS generated files on failure
        if: failure()
        run: |
          echo "===== hwdef.h ====="
          grep -n "PC4\|GPIO\|EXTI\|LED" build/MatekF405-TE/hwdef.h || true
          echo "===== chibios_hwdef.c ====="
          grep -n "PC4\|PAL_LINE\|EXTI" build/MatekF405-TE/chibios_hwdef.c || true
          echo "===== build errors ====="
          grep -Rni "error:" build/MatekF405-TE | head -50 || true

      - name: Verify firmware memory
        run: |
          arm-none-eabi-size --format=berkeley build/MatekF405-TE/bin/arducopter.elf

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-Firmware
          path: |
            build/MatekF405-TE/bin/arducopter.apj
            build/MatekF405-TE/bin/arducopter.hex
            build/MatekF405-TE/bin/arducopter_with_bl.hex
