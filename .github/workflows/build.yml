name: Build HAKRCF405V2 via SpeedyBee

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip \
          gcc-arm-none-eabi libnewlib-arm-none-eabi

    - name: Clean
      run: ./waf distclean

    # =========================
    # 🔥 ПІДМІНА hwdef
    # =========================
    - name: Inject HAKRC into SpeedyBee slot
      run: |
        rm -rf libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3
        mkdir -p libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3
        cp -r hwdef/HAKRCF405V2/* libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF405V3/

    - name: Configure
      run: ./waf configure --board SpeedyBeeF405V3

    - name: Build Copter
      run: ./waf copter

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: HAKRCF405V2
        path: build/SpeedyBeeF405V3/bin/*
