name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Factory-Level Stability Verification
        run: |
          echo "Running hardened factory-safe validation..."
          
          # Динамический поиск файла hwdef.dat без жесткой привязки к регистру папки v3/V3
          HWDEF_PATH=$(find libraries/AP_HAL_ChibiOS/hwdef/ -iname "SpeedyBeeF4V3" -type d)/hwdef.dat
          echo "Found hwdef target path: $HWDEF_PATH"
          
          if [ -z "$HWDEF_PATH" ] || [ ! -f "$HWDEF_PATH" ]; then
            echo "Error: Target hwdef.dat not found in repository structure!"
            exit 1
          fi

          # 1. Проверка: Линия EXTI должна быть полностью удалена (чистый SPI Polling)
          if grep -q "GYRO1_EXTI" "$HWDEF_PATH"; then echo "Error: Unsafe EXTI directive found!"; exit 1; fi
          # 2. Проверка каноничного подключения общего RCIN протокола на SERIAL1
          grep -q "define DEFAULT_SERIAL1_PROTOCOL SerialProtocol_RCIN" "$HWDEF_PATH" || exit 1
          # 3. Проверка целостности USART3 (PB10 свободно работает на TX3)
          grep -q "PB10 USART3_TX USART3" "$HWDEF_PATH" || exit 1
          echo "Factory-level validation PASSED."

      - name: Compile Firmware inside Docker
        run: |
          # Автоматическое определение точного имени папки платы для сборщика waf
          BOARD_TARGET=$(find libraries/AP_HAL_ChibiOS/hwdef/ -iname "SpeedyBeeF4V3" -type d -exec basename {} \;)
          echo "Compiling firmware for board target: $BOARD_TARGET"
          
          docker run --rm -v ${{ github.workspace }}:/ardupilot -w /ardupilot ardupilot/ardupilot-dev-base:latest /bin/bash -c "
            git config --global --add safe.directory /ardupilot && \
            ./waf configure --board $BOARD_TARGET && \
            ./waf copter
          "

      - name: Upload Target Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Factory-Hardened-SpeedyBeeF4v3-Release
          path: |
            build/*/bin/arducopter.apj
            build/*/bin/arducopter.hex
