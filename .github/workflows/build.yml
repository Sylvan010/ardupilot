name: build_arducopter_speedybee

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Hard Factory-Level Stability Verification
        run: |
          echo "Running hardened factory-safe validation..."
          # Виправлено регістр папки: SpeedyBeeF4v3 замість SpeedyBeeF4V3
          grep -q "PB10 GYRO1_EXTI INPUT PULLUP" libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat || exit 1
          grep -q "SPIDEV imu0 SPI1 DEVID1 GYRO1_CS" libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat || exit 1
          if [ $(grep -c "BARO " libraries/AP_HAL_ChibiOS/hwdef/SpeedyBeeF4v3/hwdef.dat) -ne 1 ]; then echo "Error: Unsafe multi-baro setup found!"; exit 1; fi
          echo "Factory-level validation PASSED."

      - name: Compile Firmware inside Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/ardupilot -w /ardupilot ardupilot/ardupilot-dev-base:latest /bin/bash -c "
            git config --global --add safe.directory /ardupilot && \
            ./waf configure --board SpeedyBeeF4v3 && \
            ./waf copter
          "

      - name: Upload Target Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Factory-Hardened-SpeedyBeeF4v3-Release
          path: |
            build/SpeedyBeeF4v3/bin/arducopter.apj
            build/SpeedyBeeF4v3/bin/arducopter.hex
