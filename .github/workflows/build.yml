name: Build HAKRC F405 V2 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip gcc-arm-none-eabi libnewlib-arm-none-eabi

    - name: Clean
      run: ./waf distclean

    - name: Verify hwdef exists
      run: |
        ls -R libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2

    - name: Configure
      run: |
        # Собираем строго на базе SpeedyBeeF405V3, на лету переопределяя маппинг пинов вашим hwdef.dat
        ./waf configure --board SpeedyBeeF405V3 --hwdef libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/hwdef.dat --defaults libraries/AP_HAL_ChibiOS/hwdef/HAKRCF405V2/defaults.parm

    - name: Build Copter
      run: ./waf copter

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HAKRCF405V2-Firmware
        path: |
          build/SpeedyBeeF405V3/bin/*.apj
          build/SpeedyBeeF405V3/bin/*.bin
