name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Hard reset target cache
        run: |
          rm -rf build

      - name: Verify HAKRC clone mapping
        run: |
          echo "===== HAKRC CLONE MAP ====="
          grep "PC4.*GYRO_INT" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          grep "PC15.*LED1" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          grep "PB12.*OSD_CS" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat
          grep "PA15.*FLASH_CS" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify configured board
        run: |
          echo "===== BOARD CHECK ====="
          grep -R "MatekF405-TE" build/MatekF405-TE/config.h || true

      - name: Verify scripting disabled
        run: |
          echo "===== SCRIPT CHECK ====="
          grep -Rni "AP_SCRIPTING_ENABLED" build/MatekF405-TE/ || true

      - name: Verify LED mapping
        run: |
          echo "===== LED MAP CHECK ====="
          grep -Rni "PC15" build/MatekF405-TE || true

      - name: Verify IMU interrupt
        run: |
          echo "===== GYRO INT CHECK ====="
          grep -Rni "PC4" build/MatekF405-TE || true
          grep -Rni "EXTI" build/MatekF405-TE || true

      - name: Verify generated hwdef
        run: |
          echo "===== GENERATED HWDEF CHECK ====="
          test -f build/MatekF405-TE/hwdef.h
          grep -Rni "HAL_EXTI_ENABLED" build/MatekF405-TE || true

      - name: Dump critical pins configuration
        run: |
          echo "===== CRITICAL PIN DUMP ====="
          grep -Rni "LED\|PC15\|PC4\|EXTI" build/MatekF405-TE || true

      - name: Build ArduCopter Firmware
        shell: bash
        run: |
          touch build.log
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS}
          set -e
          exit $status

      - name: Inspect build output tree
        if: always()
        run: |
          echo "===== REVEALING ACTUAL BUILD OUTPUT TREE ====="
          find build/MatekF405-TE -maxdepth 4 -type f | grep -E "arducopter|\.elf|\.apj|\.hex" || true

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          if [ -f build.log ]; then
            grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
            echo "===== LAST 200 LINES OF BUILD LOG ====="
            tail -n 200 build.log
          else
            echo "ERROR: build.log was not created."
          fi

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          
          # Строгая проверка существования файлов (исправлено под оригинальный ELF arducopter без расширения)
          test -f build/MatekF405-TE/bin/arducopter.apj
          test -f build/MatekF405-TE/bin/arducopter
          
          # Чтение размера из оригинального ELF-файла
          arm-none-eabi-size build/MatekF405-TE/bin/arducopter
          
          echo "Firmware OK"

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MatekF405-TE-ArduCopter-Firmware
          path: |
            build/MatekF405-TE/bin/arducopter.apj
            build/MatekF405-TE/bin/arducopter.hex
            build/MatekF405-TE/bin/arducopter_with_bl.hex
          if-no-files-found: error
