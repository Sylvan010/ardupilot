name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache ArduPilot build
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            build
          key: hakrc-f405v2-matekf405-${{ github.sha }}
          restore-keys: |
            hakrc-f405v2-matekf405-

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Clean target cache
        run: |
          rm -rf build/MatekF405-TE

      - name: Show hwdef source
        run: |
          grep "PC4" libraries/AP_HAL_ChibiOS/hwdef/MatekF405-TE/hwdef.dat

      - name: Configure Waf Build System
        run: |
          ./waf configure --board MatekF405-TE

      - name: Verify generated hwdef
        run: |
          test -f build/MatekF405-TE/hwdef.h
          grep -n "HAL_EXTI_ENABLED" build/MatekF405-TE/hwdef.h || true
          grep -n "HAL_GPIO_A_LED_PIN" build/MatekF405-TE/hwdef.h || true
          grep -n "HAL_GPIO_B_LED_PIN" build/MatekF405-TE/hwdef.h || true
          grep -n "TIM3" build/MatekF405-TE/hwdef.h || true

      - name: Dump generated pins
        run: |
          echo "===== GPIO DEFINES ====="
          grep -n "GPIO" build/MatekF405-TE/hwdef.h | head -100 || true
          
          echo "===== EXTI ====="
          grep -n "EXTI" build/MatekF405-TE/hwdef.h || true
          
          echo "===== PWM ====="
          grep -n "PWM" build/MatekF405-TE/hwdef.h | head -50 || true

      - name: Build ArduCopter Firmware
        run: |
          ./waf copter

      - name: Verify firmware memory
        run: |
          arm-none-eabi-size --format=berkeley build/MatekF405-TE/bin/arducopter.elf

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter-Firmware
          path: |
            build/MatekF405-TE/bin/arducopter.apj
            build/MatekF405-TE/bin/arducopter.hex
            build/MatekF405-TE/bin/arducopter_with_bl.hex
