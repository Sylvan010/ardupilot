      - name: Compile Firmware inside Docker (ArduPilot ChibiOS Environment)
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}:/ardupilot" \
            -w /ardupilot \
            ardupilot/ardupilot-dev-chibios:latest \
            -s <<'DOCKER_SCRIPT'

          set -e
          set -o pipefail

          git config --global --add safe.directory '*'

          rm -rf build

          ./waf distclean || true

          echo "===== BOARD CHECK ====="
          ./waf list_boards | grep -i speedybeef4v3

          echo "===== CONFIGURE ====="
          ./waf configure --board speedybeef4v3

          echo "===== BUILD COPTER ====="

          set +e

          ./waf copter -j 1 -v 2>&1 | tee /ardupilot/build.log

          WAF_STATUS=${PIPESTATUS[0]}

          set -e

          echo "WAF STATUS=$WAF_STATUS"

          if [ "$WAF_STATUS" -ne 0 ]; then

              echo "===== SIZE CHECK ====="

              find build -name arducopter \
              -exec arm-none-eabi-size {} \; || true

              echo "===== LAST LOG ====="

              tail -n 100 /ardupilot/build.log

              exit "$WAF_STATUS"

          fi

          echo "===== BUILD SUCCESS ====="

          find build -name arducopter \
          -exec arm-none-eabi-size {} \;

          DOCKER_SCRIPT
