name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/**'
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest

    container:
      image: ardupilot/ardupilot-dev-chibios:latest


    steps:


      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive



      - name: Configure git
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE



      - name: Clean old targets
        run: |
          rm -rf build

          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2



      - name: Verify HAKRC hwdef
        run: |

          echo "===== HWDEF CHECK ====="

          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "APJ_BOARD_ID AP_HW_HAKRC_F405" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PA4 GYRO_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB12 OSD_CS" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat


          grep "PB3 WS2812" \
          libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat



      - name: Configure Firmware
        run: |

          ./waf configure \
          --board FoxeerF405v2



      - name: Verify generated hwdef
        run: |

          echo "===== GENERATED CHECK ====="

          test -f build/FoxeerF405v2/hwdef.h


          grep APJ_BOARD_ID \
          build/FoxeerF405v2/hwdef.h



      - name: Build ArduCopter Firmware
        shell: bash
        run: |

          set +e

          ./waf copter -v 2>&1 | tee build.log

          status=${PIPESTATUS[0]}

          set -e

          exit $status



      - name: Show failure
        if: failure()
        run: |

          echo "===== BUILD ERROR ====="

          tail -200 build.log



      - name: Check Firmware
        run: |

          test -f build/FoxeerF405v2/bin/arducopter.apj

          echo "HAKRC F405 V2 BUILD OK"



      - name: Upload Firmware
        uses: actions/upload-artifact@v4

        with:

          name: HAKRC-F405V2-ArduCopter

          path:

            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/arducopter_with_bl.hex

          if-no-files-found: error
