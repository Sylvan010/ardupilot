name: Build HAKRC F405 V2 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Clean build & Purge legacy directories
        run: |
          rm -rf build
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2

      - name: Check HWDEF exists
        shell: bash
        run: |
          echo "===== HWDEF LOCATION ====="
          pwd
          ls -la libraries/AP_HAL_ChibiOS/hwdef/
          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat
          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm
          echo "===== HWDEF FOUND ====="

      - name: Show hardware mapping
        shell: bash
        run: |
          echo "===== BOARD IDENTITY ====="
          grep -E "^APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

          echo "===== SPI1 IMU CONFIG ====="
          grep -E "SPI1|imu1" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

          echo "===== MAX7456 OSD CONFIG ====="
          grep -E "SPI2|osd" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

      - name: Validate source hwdef
        run: |
          echo "===== SOURCE HWDEF VALIDATION ====="
          test -f libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PA4  GYRO1_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PC4  GYRO1_EXTI" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PB12 OSD1_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "BARO DPS310" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

      - name: Configure Waf Build System
        run: |
          ./waf configure --board FoxeerF405v2

      - name: Verify configured board
        run: |
          echo "===== BOARD CHECK ====="
          test -d build/FoxeerF405v2
          test -f build/FoxeerF405v2/hwdef.h

      - name: Verify generated board identity
        run: |
          echo "===== HWDEF BOARD ID ====="
          grep -R "APJ_BOARD_ID" build/FoxeerF405v2/
          grep -R -E "^#define[[:space:]]+APJ_BOARD_ID[[:space:]]+AP_HW_FOXEERF405_V2[[:space:]]*$" build/FoxeerF405v2/ || exit 1

      - name: Verify SPI physical mapping
        run: |
          echo "===== SPI GPIO CHECK ====="
          grep -Rni "PB12" build/FoxeerF405v2/hwdef.h
          grep -Rni "PA4" build/FoxeerF405v2/hwdef.h

      - name: Build ArduCopter
        shell: bash
        run: |
          touch build.log
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS}
          set -e
          exit $status

      - name: Inspect build output tree
        if: always()
        run: |
          echo "===== REVEALING ACTUAL BUILD OUTPUT TREE ====="
          find build/FoxeerF405v2 -maxdepth 4 -type f | grep -E "arducopter|\.elf|\.apj|\.hex" || true

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          if [ -f build.log ]; then
            grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
            tail -n 200 build.log
          else
            echo "ERROR: build.log was not created."
          fi

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          test -f build/FoxeerF405v2/bin/arducopter.apj
          test -f build/FoxeerF405v2/bin/arducopter
          test -f build/FoxeerF405v2/bin/arducopter_with_bl.hex
          
          arm-none-eabi-size build/FoxeerF405v2/bin/arducopter
          
          echo "=================================="
          echo "    HAKRC F405 V2 BUILD OK "
          echo "=================================="

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-Production-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/arducopter_with_bl.hex
          if-no-files-found: error
