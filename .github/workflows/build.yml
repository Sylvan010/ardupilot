name: Build HAKRC F405V2 Firmware

on:
  workflow_dispatch:

jobs:
  build-copter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Prerequisite Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-setuptools python3-wheel ccache
          pip3 install intelhex empy==3.3.4 pexpect

      - name: Hard reset target cache
        run: |
          rm -rf build

      - name: Verify HAKRC clone mapping
        run: |
          echo "===== HAKRC CLONE MAP ====="
          grep "PC4.*GYRO_INT" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PC14.*LED0" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PB12.*OSD_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep "PA15.*FLASH_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

      - name: Configure Waf Build System
        run: |
          ./waf configure --board FoxeerF405v2

      - name: Verify board identity
        run: |
          echo "===== BOARD ID CHECK ====="
          grep -R "FoxeerF405v2" build/FoxeerF405v2/config.h
          grep -E "#define APJ_BOARD_ID 131" build/FoxeerF405v2/hwdef.h || exit 1

      - name: Verify board ID value
        run: |
          echo "===== BOARD ID VALUE ====="
          grep "#define APJ_BOARD_ID" build/FoxeerF405v2/hwdef.h

      - name: Verify SPI devices
        run: |
          echo "===== SPI DEVICE CHECK ====="
          grep -Rni "OSD_CS" build/FoxeerF405v2/hwdef.h
          grep -Rni "FLASH_CS" build/FoxeerF405v2/hwdef.h

      - name: Verify scripting disabled
        run: |
          echo "===== SCRIPT CHECK ====="
          grep -Rni "AP_SCRIPTING_ENABLED" build/FoxeerF405v2/ || true

      - name: Verify LED mapping
        run: |
          echo "===== LED MAP CHECK ====="
          grep -Rni "PC14" build/FoxeerF405v2/ || true

      - name: Verify IMU interrupt
        run: |
          echo "===== GYRO INT CHECK ====="
          grep -Rni "PC4" build/FoxeerF405v2/ || true
          grep -Rni "EXTI" build/FoxeerF405v2/ || true

      - name: Verify generated hwdef
        run: |
          echo "===== GENERATED HWDEF CHECK ====="
          test -f build/FoxeerF405v2/hwdef.h
          grep -Rni "HAL_EXTI_ENABLED" build/FoxeerF405v2/ || true

      - name: Dump critical pins configuration
        run: |
          echo "===== CRITICAL PIN DUMP ====="
          grep -Rni "LED\|PC14\|PC4\|EXTI" build/FoxeerF405v2/ || true

      - name: Build ArduCopter Firmware
        shell: bash
        run: |
          touch build.log
          set +e
          ./waf copter -v 2>&1 | tee build.log
          status=${PIPESTATUS}
          set -e
          exit $status

      - name: Inspect build output tree
        if: always()
        run: |
          echo "===== REVEALING ACTUAL BUILD OUTPUT TREE ====="
          find build/FoxeerF405v2 -maxdepth 4 -type f | grep -E "arducopter|\.elf|\.apj|\.hex" || true

      - name: Extract failure
        if: failure()
        run: |
          echo "===== PARSING COMPILER ERRORS ====="
          if [ -f build.log ]; then
            grep -E "error:|fatal error|No such file|unknown|invalid|undeclared|undefined|conflicting|redefinition|expected|mismatch" build.log || true
            echo "===== LAST 200 LINES OF BUILD LOG ====="
            tail -n 200 build.log
          else
            echo "ERROR: build.log was not created."
          fi

      - name: Verify final firmware
        run: |
          echo "===== FINAL ARTIFACT CHECK ====="
          
          test -f build/FoxeerF405v2/bin/arducopter.apj
          test -f build/FoxeerF405v2/bin/arducopter
          
          arm-none-eabi-size build/FoxeerF405v2/bin/arducopter
          
          echo "Firmware OK"

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-ArduCopter-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/arducopter.hex
            build/FoxeerF405v2/bin/arducopter_with_bl.hex
          if-no-files-found: error
