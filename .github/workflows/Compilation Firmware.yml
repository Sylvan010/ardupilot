name: Build DAKEFPV F405 Firmware

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405/hwdef.dat'
      - 'libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405/hwdef-bl.dat'
      - 'libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405/defaults.parm'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Clean Legacy Conflict Targets
        run: |
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405_old
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/DAKEFPV_F405

      - name: Configure Firmware
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          ./waf configure --board DAKEFPVF405

      - name: Build Copter Firmware
        run: |
          ./waf copter

      - name: Upload APJ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAKEFPV-F405-ArduCopter
          path: |
            build/DAKEFPVF405/bin/arducopter.apj
            build/DAKEFPVF405/bin/arducopter_with_bl.hex
