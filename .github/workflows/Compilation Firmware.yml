name: Build DAKEFPV F405 Target

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Apply Safe Git Patch for AnalogIn ADCD3
        run: |
          cat <<'EOF' | git apply --ignore-whitespace
          --- a/libraries/AP_HAL_ChibiOS/AnalogIn.cpp
          +++ b/libraries/AP_HAL_ChibiOS/AnalogIn.cpp
          @@ -425,3 +425,5 @@
               if (adcp == &ADCD2) {
                   return 1;
               }
           #endif
          +#if defined(STM32_ADC_USE_ADC3) && STM32_ADC_USE_ADC3
               if (adcp == &ADCD3) {
                   return 2;
               }
          +#endif
           #endif
               return 0;
           }
          EOF

      - name: Configure Firmware
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          ./waf distclean
          ./waf configure --board DAKEFPVF405

      - name: Build Copter Firmware
        run: |
          ./waf copter

      - name: Upload APJ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAKEFPV-F405-Official-Release
          path: |
            build/DAKEFPVF405/bin/arducopter.apj
            build/DAKEFPVF405/bin/arducopter_with_bl.hex
