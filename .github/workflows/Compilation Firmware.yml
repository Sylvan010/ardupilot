name: Build DAKEFPV F405 Target

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/DAKEFPVF405/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Inject Safe Protection for AnalogIn ADCD3 (Natively)
        run: |
          # Використовуємо надійний Python-скрипт для точкової ізоляції ADCD3 без крихких git-патчів
          python3 -c "
          filepath = 'libraries/AP_HAL_ChibiOS/AnalogIn.cpp'
          with open(filepath, 'r') as f:
              code = f.read()
          
          old_block = 'if (adcp == &ADCD3) {\n        return 2;\n    }'
          new_block = '#if defined(STM32_ADC_USE_ADC3) && STM32_ADC_USE_ADC3\n    if (adcp == &ADCD3) {\n        return 2;\n    }\n#endif'
          
          if old_block in code:
              code = code.replace(old_block, new_block)
              with open(filepath, 'w') as f:
                  f.write(code)
              print('AnalogIn.cpp successfully patched!')
          else:
              print('Target block not found or already patched.')
          "

      - name: Configure Firmware
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          ./waf distclean
          ./waf configure --board DAKEFPVF405

      - name: Build Copter Firmware
        run: |
          ./waf copter

      - name: Upload APJ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAKEFPV-F405-Official-Release
          path: |
            build/DAKEFPVF405/bin/arducopter.apj
            build/DAKEFPVF405/bin/arducopter_with_bl.hex
