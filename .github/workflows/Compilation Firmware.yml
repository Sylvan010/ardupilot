name: Compilation Firmware.yml

on:
  push:
    paths:
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat'
      - 'libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Clean Legacy Conflict Targets
        run: |
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405V2
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC_F405_V2

      - name: Configure Firmware
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          ./waf configure --board FoxeerF405v2

      - name: Build Copter Firmware
        run: |
          ./waf copter

      - name: Upload APJ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduCopter
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/arducopter_with_bl.hex
