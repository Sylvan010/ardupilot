name: Build Custom Production Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Checkout репозиторію
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині Docker-сесії
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Чисте копіювання нашої готової архітектури HAKRC замість Foxeer (Без жодного sed!)
      - name: Inject Pure HAKRC Hardware Profile
        run: |
          echo "=== INJECTING HAKRC INDEPENDENT REPRORT PROFILES ==="
          cp hakrc-config/hwdef.dat libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          cp hakrc-config/hwdef-bl.dat libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat
          cp hakrc-config/defaults.parm libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm
          echo "Profiles locked successfully."

      # 4. Скидання кешу та конфігурація завантажувача
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 5. Компіляція завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 6. Скидання кешу та конфігурація основної прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 7. Компіляція ArduCopter
      - name: Build Copter Firmware
        run: ./waf copter

      # 8. Тотальний пошук та перевірка вихідних шляхів прошивки (За вашим планом!)
      - name: Debug firmware output
        run: |
          echo "===== ALL APJ IN WORKSPACE ====="
          find ${{ github.workspace }} -name "*.apj" -ls || true

          echo "===== ALL BIN IN WORKSPACE ====="
          find ${{ github.workspace }} -name "*.bin" -ls || true

      # 9. Збір готової прошивки в розшарену хост-директорію за допомогою find + exec
      - name: Collect Firmware Artifacts
        run: |
          # Створюємо папку строго всередині розшареного воркспейсу хоста
          mkdir -p ${{ github.workspace }}/production_firmware
          
          echo "=== EXECUTING ABSOLUTE MONOLITHIC COPY ==="
          find ${{ github.workspace }}/build/FoxeerF405v2 -type f \( -name "*.apj" -o -name "*.bin" -o -name "*.hex" \) -exec cp {} ${{ github.workspace }}/production_firmware/ \;
          
          echo "=== CONSOLE VISUALIZATION ==="
          ls -lah ${{ github.workspace }}/production_firmware

      # 10. Публікація готових файлів прошивки HAKRC для скачування (Абсолютний шлях)
      - name: Upload HAKRC Production Firmware
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduPilot-Release
          path: ${{ github.workspace }}/production_firmware/
          if-no-files-found: error
