name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория со всеми субмодулями
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности внутри Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Ресурсный мапинг HAKRC (Регулярные выражения [[:space:]]+ полностью защищают от косяков с пробелами)
      - name: Modify Hardware for HAKRC
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          
          # === КРОК 1. ПЕРЕВЕДЕННЯ ШИН SPI (Освобождаем PC2, PC3, PC14, PB12 ДО перемапингу перифервии) ===
          sed -E -i 's/PC2[[:space:]]+SPI2_MISO/PB14 SPI2_MISO/g' $HW_FILE
          sed -E -i 's/PC3[[:space:]]+SPI2_MOSI/PB15 SPI2_MOSI/g' $HW_FILE
          sed -E -i 's/PB3[[:space:]]+SPI3_SCK/PC10 SPI3_SCK/g' $HW_FILE
          sed -E -i 's/PB4[[:space:]]+SPI3_MISO/PC11 SPI3_MISO/g' $HW_FILE
          
          # Переносим Chip Select линий OSD и Flash (Освобождаем PC14 под LED1)
          sed -E -i 's/PB12[[:space:]]+FLASH1_CS/PA15 FLASH1_CS/g' $HW_FILE
          sed -E -i 's/PC14[[:space:]]+OSD1_CS/PB12 OSD1_CS/g' $HW_FILE
          
          # Перенаправляем SPIDEV абстракции на физические шины HAKRC (OSD на SPI2, Flash на SPI3)
          sed -E -i 's/SPIDEV[[:space:]]+dataflash[[:space:]]+SPI2/SPIDEV dataflash SPI3/g' $HW_FILE
          sed -E -i 's/SPIDEV[[:space:]]+osd[[:space:]]+SPI3/SPIDEV osd       SPI2/g' $HW_FILE

          # === КРОК 2. АНАЛОГОВЫЕ ДАТЧИКИ БАТАРЕИ (ADC) (Тепер PC3 и PC1 полностью свободны!) ===
          sed -E -i 's/PC0[[:space:]]+BATT_VOLTAGE_SENS/PC1 BATT_VOLTAGE_SENS/g' $HW_FILE
          sed -E -i 's/PC1[[:space:]]+BATT_CURRENT_SENS/PC3 BATT_CURRENT_SENS/g' $HW_FILE
          sed -E -i 's/define[[:space:]]+HAL_BATT_VOLT_PIN[[:space:]]+10/define HAL_BATT_VOLT_PIN 11/g' $HW_FILE
          sed -E -i 's/define[[:space:]]+HAL_BATT_CURR_PIN[[:space:]]+11/define HAL_BATT_CURR_PIN 13/g' $HW_FILE

          # === КРОК 3. СВЕТОДИОДЫ И AP_NOTIFY (Тепер PC14 и PC15 свободны от OSD/Buzzer!) ===
          sed -E -i 's/PA13[[:space:]]+LED0[[:space:]]+OUTPUT[[:space:]]+LOW/PC15 LED0 OUTPUT LOW/g' $HW_FILE
          sed -E -i 's/PA14[[:space:]]+LED1[[:space:]]+OUTPUT[[:space:]]+LOW/PC14 LED1 OUTPUT LOW/g' $HW_FILE
          
          # Дописываем макросы привязки Notify LED в самый конец основного hwdef
          echo "" >> $HW_FILE
          echo "# HAKRC AP_Notify LED Configuration" >> $HW_FILE
          echo "define HAL_GPIO_A_LED_PIN 90" >> $HW_FILE
          echo "define HAL_GPIO_B_LED_PIN 91" >> $HW_FILE
          
          # Корректируем светодиод загрузчика (Bootloader LED)
          sed -E -i 's/PA13[[:space:]]+LED_BOOTLOADER[[:space:]]+OUTPUT[[:space:]]+LOW/PC15 LED_BOOTLOADER OUTPUT LOW/g' $BL_FILE

          # === КРОК 4. UART ИНТЕРФЕЙСЫ ===
          sed -E -i 's/PA9[[:space:]]+USART1_TX/PB6  USART1_TX/g' $HW_FILE
          sed -E -i 's/PA10[[:space:]]+USART1_RX/PB7  USART1_RX/g' $HW_FILE
          sed -E -i 's/PC10[[:space:]]+USART3_TX/PB10 USART3_TX/g' $HW_FILE
          sed -E -i 's/PC11[[:space:]]+USART3_RX/PB11 USART3_RX/g' $HW_FILE

          # === КРОК 5. ТОЧЕЧНОЕ ОТКЛЮЧЕНИЕ BLACKBOX ЛОГГЕРА (По твоему плану) ===
          sed -E -i 's/define[[:space:]]+HAL_LOGGING_DATAFLASH_ENABLED[[:space:]]+1/define HAL_LOGGING_DATAFLASH_ENABLED 0/g' $HW_FILE

          # === КРОК 6. ОЧИСТКА СТАРЫХ КОНФЛИКТНЫХ РЕСУРСОВ PINIO ===
          sed -i '/PINIO1/d' $HW_FILE
          sed -i '/PINIO2/d' $HW_FILE

          # === КРОК 7. ПОЛНАЯ КАРТА ДВИГАТЕЛЕЙ PWM (Таймеры TIM8/TIM1/TIM3 строго из Betaflight) ===
          sed -E -i 's/PA8[[:space:]]+TIM1_CH1[[:space:]]+TIM1[[:space:]]+PWM\(1\)/PC8  TIM8_CH3 TIM8 PWM(1)/g' $HW_FILE
          sed -E -i 's/PC9[[:space:]]+TIM8_CH4[[:space:]]+TIM8[[:space:]]+PWM\(2\)/PC9  TIM8_CH4 TIM8 PWM(2)/g' $HW_FILE
          sed -E -i 's/PC8[[:space:]]+TIM8_CH3[[:space:]]+TIM8[[:space:]]+PWM\(3\)/PA8  TIM1_CH1 TIM1 PWM(3)/g' $HW_FILE
          sed -E -i 's/PB15[[:space:]]+TIM1_CH3N[[:space:]]+TIM1[[:space:]]+PWM\(4\)/PA9  TIM1_CH2 TIM1 PWM(4)/g' $HW_FILE
          sed -E -i 's/PB6[[:space:]]+TIM4_CH1[[:space:]]+TIM4[[:space:]]+PWM\(5\)/PB0  TIM3_CH3 TIM3 PWM(5)/g' $HW_FILE
          sed -E -i 's/PA15[[:space:]]+TIM2_CH1[[:space:]]+TIM2[[:space:]]+PWM\(6\)/PB1  TIM3_CH4 TIM3 PWM(6)/g' $HW_FILE
          sed -E -i 's/PB11[[:space:]]+TIM2_CH4[[:space:]]+TIM2[[:space:]]+PWM\(7\)/PA10 TIM1_CH3 TIM1 PWM(7)/g' $HW_FILE
          sed -E -i 's/PB10[[:space:]]+TIM2_CH3[[:space:]]+TIM2[[:space:]]+PWM\(8\)/PB4  TIM3_CH1 TIM3 PWM(8)/g' $HW_FILE
          sed -E -i 's/PB1[[:space:]]+TIM3_CH4[[:space:]]+TIM3[[:space:]]+PWM\(9\)/PB3  TIM2_CH2 TIM2 PWM(9)/g' $HW_FILE
          
          # === КРОК 8. НАСТРОЙКА DEFAULTS.PARM (Для светодиодов, шкал ADC и OSD) ===
          if [ ! -f "$PARM_FILE" ]; then
            touch "$PARM_FILE"
          fi
          echo "NTF_LED_TYPES 257" >> $PARM_FILE
          echo "NTF_LED_BRIGHT 2" >> $PARM_FILE
          echo "BATT_MONITOR 4" >> $PARM_FILE
          echo "BATT_VOLT_PIN 11" >> $PARM_FILE
          echo "BATT_CURR_PIN 13" >> $PARM_FILE
          echo "OSD_TYPE 1" >> $PARM_FILE
          
          echo "=== PRODUCTION HAKRC CONFIG GENERATED SUCCESSFULLY ==="

      # 4. Полный сброс кэша графа и чистая конфигурация/сборка загрузчика
      - name: Build Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      # 5. Сброс кэша графа и чистая ... сборка основной прошивки Copter
      - name: Build Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 6. Выгрузка готовой прошивки в артефакты запуска GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
