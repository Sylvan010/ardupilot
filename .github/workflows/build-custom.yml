name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # Автоматично генеруємо файл патчу прямо на сервері перед збіркою
      - name: Create and Apply HAKRC Resource Patch
        run: |
          cat << 'EOF' > hakrc_resources.patch
          diff --git a/libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat b/libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          --- a/libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          +++ b/libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          @@ -10,31 +10,31 @@
           SERIAL_ORDER OTG1 USART1 USART2 USART3 UART4 UART5 USART6
           
           # UART1
          -PA9  USART1_TX USART1
          -PA10 USART1_RX USART1
          +PB6  USART1_TX USART1
          +PB7  USART1_RX USART1
           
           # UART2 (RC/SBUS)
          -PC0  SBUS_INVERT OUTPUT LOW
           PA2  USART2_TX USART2
           PA3  USART2_RX USART2
          +PC0  SBUS_INVERT OUTPUT LOW
           
           # UART3
          -PC10 USART3_TX USART3
          -PC11 USART3_RX USART3
          +PB10 USART3_TX USART3
          +PB11 USART3_RX USART3
           
           # UART4
           PA0  UART4_TX UART4
           PA1  UART4_RX UART4
           
           # UART5
           PC12 UART5_TX UART5
           PD2  UART5_RX UART5
           
           # UART6
           PC6  USART6_TX USART6
           PC7  USART6_RX USART6
           
           # I2C
           PB8  I2C1_SCL I2C1
           PB9  I2C1_SDA I2C1
           
           @@ -42,16 +42,16 @@
           PA5  SPI1_SCK SPI1
           PA6  SPI1_MISO SPI1
           PA7  SPI1_MOSI SPI1
           PA4  GYRO_CS CS
           
           # SPI2 (OSD)
          -PB13 SPI2_SCK SPI2
          -PB14 SPI2_MISO SPI2
          -PB15 SPI2_MOSI SPI2
          -PC14 OSD_CS CS
          +PB13 SPI2_SCK SPI2
          +PB14 SPI2_MISO SPI2
          +PB15 SPI2_MOSI SPI2
          +PB12 OSD_CS CS
           
           # SPI3 (Flash)
          -PB3  SPI3_SCK SPI3
          -PB4  SPI3_MISO SPI3
          -PB5  SPI3_MOSI SPI3
          -PB12 FLASH_CS CS
          +PC10 SPI3_SCK SPI3
          +PC11 SPI3_MISO SPI3
          +PB5  SPI3_MOSI SPI3
          +PA15 FLASH_CS CS
           
           @@ -58,15 +58,15 @@
           SPIDEV gyro1 SPI1 SPEED_2M SPEED_8M GYRO_CS LOW
          -SPIDEV osd   SPI2 SPEED_4M SPEED_4M OSD_CS   LOW
          -SPIDEV flash SPI3 SPEED_4M SPEED_8M FLASH_CS LOW
          +SPIDEV osd   SPI2 SPEED_4M SPEED_4M OSD_CS LOW
          +SPIDEV flash SPI3 SPEED_4M SPEED_8M FLASH_CS LOW
           
           # EXTI
           PC4 MPU6000_DRDY INPUT
           
           # IMU
          -IMU Invensense SPI:gyro1 ROTATION_YAW_180
          -IMU BMI270 SPI:gyro1 ROTATION_YAW_180
          +IMU Invensense SPI:gyro1 ROTATION_YAW_90
          +IMU BMI270 SPI:gyro1 ROTATION_YAW_90
           
           # BARO
           BARO BMP280 I2C:0:0x76
           BARO DPS310 I2C:0:0x76
           @@ -74,15 +74,15 @@
           # ADC
          -PC0 ADC_BAT VOLTAGE_ADC PINIO(1)
          -PC1 ADC_CURR CURRENT_ADC PINIO(2)
          +PC1 ADC_BAT VOLTAGE_ADC
          +PC3 ADC_CURR CURRENT_ADC
          -define HAL_BATT_VOLT_PIN 0
          -define HAL_BATT_CURR_PIN 1
          +define HAL_BATT_VOLT_PIN 1
          +define HAL_BATT_CURR_PIN 3
           define HAL_BATT_VOLT_SCALE 10.0
           define HAL_BATT_CURR_SCALE 100.0
           
           # LED
          -PA13 LED1 OUTPUT HIGH
          -PA14 LED2 OUTPUT HIGH
          +PC14 LED1 OUTPUT HIGH
          +PC15 LED2 OUTPUT HIGH
           
           # BUZZER
          -PC15 BUZZER OUTPUT HIGH
          +PC13 BUZZER OUTPUT HIGH
           
           # PINIO
          -PB14 PINIO1 OUTPUT LOW GPIO(81)
           
           # PWM
          -PA8  TIM1_CH1  PWM1 Motor
          -PC9  TIM3_CH4  PWM2 Motor
          -PC8  TIM3_CH3  PWM3 Motor
          -PB15 TIM1_CH3N PWM4 Motor
          -PB6  TIM4_CH1  PWM5 Motor
          -PA15 TIM2_CH1  PWM6 Motor
          -PB11 TIM2_CH4  PWM7 Motor
          -PB10 TIM2_CH3  PWM8 Motor
          -PB1  TIM3_CH4  PWM9 Servo
          +PC8  TIM8_CH3  PWM1 Motor
          +PC9  TIM8_CH4  PWM2 Motor
          +PA8  TIM1_CH1  PWM3 Motor
          +PA9  TIM1_CH2  PWM4 Motor
          +PB0  TIM3_CH3  PWM5 Motor
          +PB1  TIM3_CH4  PWM6 Motor
          +PA10 TIM1_CH3  PWM7 Motor
          +PB4  TIM3_CH1  PWM8 Motor
          +PB3  TIM2_CH2  PWM9 Servo
          EOF
          git apply --check hakrc_resources.patch
          git apply hakrc_resources.patch

      - name: Build Bootloader
        run: |
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      - name: Build Copter Firmware
        run: |
          ./waf configure --board FoxeerF405v2
          ./waf copter

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
