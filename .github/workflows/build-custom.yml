name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Завантажуємо вихідний код вашої гілки репозиторію з усіма субмодулями
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Перевірка наявності файлу патчу
      - name: Check Patch Exists
        run: |
          test -f hakrc_resources.patch
          echo "Patch found"

      # 4. Накладаємо виправлений точковий патч ресурсів на Foxeer target
      - name: Apply HAKRC Resource Patch
        run: |
          git apply --check hakrc_resources.patch
          git apply hakrc_resources.patch

      # 5. Хірургічна верифікація: перевіряємо, чи патч ліг на вихідний код так, як очікувалося
      - name: Verify HAKRC mapping
        run: |
          echo "=== VERIFYING UART1 ==="
          grep "PB6  USART1_TX" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "=== VERIFYING SPI3 SCK ==="
          grep "PC10 SPI3_SCK" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "=== VERIFYING OSD CS ==="
          grep "PB12 OSD1_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "=== VERIFYING FLASH CS ==="
          grep "PA15 FLASH1_CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "=== VERIFYING STATUS LED ==="
          grep "PC15 LED0" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

      # 6. Очищення кешу та конфігурація завантажувача
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 7. Перевірка автоматично згенерованого ChibiOS-коду для завантажувача
      - name: Check Generated Bootloader Hardware
        run: |
          echo "=== CHECKING GENERATED BOOTLOADER DEFINITIONS ==="
          grep -R "PB12.*CS" build/FoxeerF405v2/ || true
          grep -R "PC15.*LED" build/FoxeerF405v2/ || true

      # 8. Фінальна компіляція завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 9. Очищення кешу та конфігурація основної прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 10. Перевірка автоматично згенерованого ChibiOS-коду для коптера
      - name: Check Generated Copter Hardware
        run: |
          echo "=== CHECKING GENERATED COPTER DEFINITIONS ==="
          grep -R "PC8.*TIM8_CH3" build/FoxeerF405v2/
          grep -R "PB12.*OSD1_CS" build/FoxeerF405v2/

      # 11. Фінальна компіляція основної прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: ./waf copter

      # 12. Експортуємо готові .apj та .bin файли в артефакти запуску GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
