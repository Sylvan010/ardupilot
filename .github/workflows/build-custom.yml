name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистий checkout оригінального репозиторію FoxeerF405v2 (100% фабричний стан)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Точковий хірургічний ремапінг HAKRC поверх оригінальної бази Foxeer (З урахуванням табів та пробілів)
      - name: Patch FoxeerF405v2 to HAKRC F405V2
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          
          echo "=== HAKRC REMAP PATCH START ==="
          
          # Створення бекапу оригінального файлу за вашим планом
          cp $HW_FILE ${HW_FILE}.backup
          
          # =================================
          # BOARD ID КОРРЕКЦІЯ
          # =================================
          sed -i '/APJ_BOARD_ID/d' $HW_FILE
          echo "APJ_BOARD_ID 1067" >> $HW_FILE

          # =================================
          # ТОЧКОВА ЗАЧИСТКА ФАБРИЧНИХ ШИН SPI (Універсальні регулярні вирази ловлять будь-які \t та пробіли)
          # =================================
          # Очищення SPI1 (Гіроскоп) — превентивний фікс помилки PA5 redefined
          sed -E -i '/PA5[[:space:]]+SPI1_SCK/d' $HW_FILE
          sed -E -i '/PA6[[:space:]]+SPI1_MISO/d' $HW_FILE
          sed -E -i '/PA7[[:space:]]+SPI1_MOSI/d' $HW_FILE
          sed -i '/GYRO1_CS/d' $HW_FILE
          sed -i '/SPIDEV.*imu1/d' $HW_FILE

          # Очищення SPI2 (MAX7456 OSD) — фікс помилки PB14 redefined
          sed -E -i '/PB13[[:space:]]+SPI2_SCK/d' $HW_FILE
          sed -E -i '/PB14[[:space:]]+SPI2_MISO/d' $HW_FILE
          sed -E -i '/PB15[[:space:]]+SPI2_MOSI/d' $HW_FILE
          sed -i '/OSD1_CS/d' $HW_FILE
          sed -i '/[Oo][Ss][Dd]/d' $HW_FILE

          # Очищення SPI3 (W25Q128 Flash) — превентивний фікс помилки PC10 redefined
          sed -E -i '/PC10[[:space:]]+SPI3_SCK/d' $HW_FILE
          sed -E -i '/PC11[[:space:]]+SPI3_MISO/d' $HW_FILE
          sed -E -i '/PB5[[:space:]]+SPI3_MOSI/d' $HW_FILE
          sed -i '/FLASH1_CS/d' $HW_FILE
          sed -i '/dataflash/d' $HW_FILE
          sed -i '/HAL_LOGGING_DATAFLASH/d' $HW_FILE

          # Очищення старих UART інтерфейсів Foxeer для безконфліктної пересадки портів HAKRC
          sed -i '/USART1_TX/d;/USART1_RX/d' $HW_FILE
          sed -i '/USART3_TX/d;/USART3_RX/d' $HW_FILE
          sed -i '/UART5_TX/d;/UART5_RX/d' $HW_FILE

          # Очищення аналогових датчиків, світлодіодів та бузера Foxeer
          sed -i '/BATT_VOLTAGE_SENS/d;/BATT_CURRENT_SENS/d' $HW_FILE
          sed -i '/HAL_BATT_VOLT_PIN/d;/HAL_BATT_CURR_PIN/d' $HW_FILE
          sed -i '/LED0/d;/LED1/d;/BUZZER/d' $HW_FILE
          sed -i '/HAL_GPIO_A_LED_PIN/d;/HAL_GPIO_B_LED_PIN/d;/HAL_BUZZER_PIN/d' $HW_FILE

          # Зачищаємо старі PWM виходи Foxeer (Звільняємо таймери під карту двигунів HAKRC)
          sed -i '/PWM(/d' $HW_FILE
          
          # Стираємо старий світлодіод із завантажувача (Bootloader LED)
          sed -i '/PA13 LED_BOOTLOADER/d' $BL_FILE

          # =================================
          # ІНЖЕКЦІЯ ЧИСТОЇ КАРТИ SPI HAKRC (Строго за вашою прозвонкою мультиметром)
          # =================================
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 SPI MAP ===
          PA5  SPI1_SCK SPI1
          PA6  SPI1_MISO SPI1
          PA7  SPI1_MOSI SPI1
          PA4  GYRO1_CS CS

          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS CS

          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS

          SPIDEV gyro1      SPI1 SPEED_2M SPEED_8M GYRO1_CS LOW
          SPIDEV osd       SPI2 DEVID1 OSD1_CS MODE0 10*MHZ
          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ
          EOF

          # =================================
          # ІНЖЕКЦІЯ КАРТЫ UART (Канонічний 3-компонентний синтаксис USART5 під ядро 4.8.0)
          # =================================
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 UART MAP ===
          PB6  USART1_TX USART1
          PB7  USART1_RX USART1

          PA2  USART2_TX USART2
          PA3  USART2_RX USART2
          PC0  SBUS_INVERT OUTPUT LOW

          PB10 USART3_TX USART3
          PB11 USART3_RX USART3 NODMA

          PC12 UART5_TX USART5
          PD2  UART5_RX USART5

          PC6  USART6_TX USART6
          PC7  USART6_RX USART6
          EOF

          # =================================
          # ІНЖЕКЦІЯ АНАЛОГОВИХ ДАТЧИКІВ ADC (Канали 11 та 13)
          # =================================
          cat >> $HW_FILE <<EOF

          # === HAKRC ANALOG ADC SENSORS ===
          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)
          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13
          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0
          EOF

          # =================================
          # ІНЖЕКЦІЯ СВЕТОДИОДІВ ТА AP_NOTIFY (Залишаємо чистий апаратний мапінг ніжок)
          # =================================
          cat >> $HW_FILE <<EOF

          # === HAKRC SYSTEM LEDs & BUZZER ===
          PC15 LED0 OUTPUT LOW GPIO(90)
          PC14 LED1 OUTPUT LOW GPIO(91)
          PC13 BUZZER OUTPUT GPIO(80) LOW
          define HAL_BUZZER_PIN 80

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          EOF

          # =================================
          # ІНЖЕКЦІЯ ПОВНОЇ КАРТИ ДВИГУНІВ PWM (Строго за Betaflight Dump)
          # =================================
          cat >> $HW_FILE <<EOF

          # === HAKRC PWM MOTOR OUTPUTS ===
          PC8  TIM8_CH3 TIM8 PWM(1)
          PC9  TIM8_CH4 TIM8 PWM(2)
          PA8  TIM1_CH1 TIM1 PWM(3)
          PA9  TIM1_CH2 TIM1 PWM(4)
          PB0  TIM3_CH3 TIM3 PWM(5)
          PB1  TIM3_CH4 TIM3 PWM(6)
          PA10 TIM1_CH3 TIM1 PWM(7)
          PB4  TIM3_CH1 TIM3 PWM(8)
          PB3  TIM2_CH2 TIM2 PWM(9)
          EOF

          # =================================
          # ПРОГРАМНЕ ВИМКНЕННЯ BLACKBOX ЛОГГЕРА (Зберігаємо пам'ять під Waypoints)
          # =================================
          cat >> $HW_FILE <<EOF

          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF

          # =================================
          # ОВЕРРАЙД СВЕТОДИОДА ЗАВАНТАЖУВАЧА
          # =================================
          cat >> $BL_FILE <<EOF

          # --- HAKRC Bootloader Overrides ---
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF
          
          echo "=== HAKRC REMAP PATCH DONE ==="

      # 4. Діагностичний контроль перед визовом waf (Перевіряємо унікальність рядків)
      - name: Diagnostics and Resource Verification
        run: |
          echo "=== DIAGNOSTICS: GREP FOR PB14 ==="
          grep -n "PB14" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== DIAGNOSTICS: GREP FOR PA5 ==="
          grep -n "PA5" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== DIAGNOSTICS: GREP FOR UART5 ==="
          grep -n "UART5" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true

      # 5. Скидання кешу та конфігурація завантажувача
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 6. Перевірка згенерованого ChibiOS-коду за фізичними лініями
      - name: Check Generated Bootloader Hardware
        run: |
          echo "=== CHECKING GENERATED BOOTLOADER DEFINITIONS ==="
          grep -R "PC15" build/FoxeerF405v2/ || true

      # 7. Фінальна компіляція завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 8. Налаштування defaults.parm під ядро 4.8.0 (LOG_BACKEND_TYPE 1, OSD включено, RC тумблеры залочені)
      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << 'EOF_PARM' > $PARM_FILE
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 1
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          
          # Опції тумблерів радіоуправління для стабільного Arming/Disarm і отключения GPS під 4.8.0
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          echo "Production defaults.parm locked."

      # 9. Очитка кешу та конфігурація основної прошивки квадрокоптера
      - name: Configure and Build Copter
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 10. Експортуємо готові .apj та .bin файли в артефакти запуску GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
