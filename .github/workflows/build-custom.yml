name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория FoxeerF405v2 (100% фабричное состояние)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Точечный хирургический ремапинг HAKRC поверх оригинального hwdef Foxeer
      - name: Patch FoxeerF405v2 to HAKRC F405V2
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          
          echo "=== HAKRC REMAP PATCH START ==="
          
          # Гарантируем 100% заводское состояние оригинальных файлов перед инжекцией
          git checkout -- $HW_FILE $BL_FILE
          
          # Создаем бэкап оригинального файла по вашему плану
          cp $HW_FILE ${HW_FILE}.backup
          
          # === ФИКС BOARD ID ПИД ТЕКСТОВЫЙ СТАНДАРТ 4.8.0 ===
          sed -i '/APJ_BOARD_ID/d' $HW_FILE
          echo "APJ_BOARD_ID AP_HW_FOXEERF405_V2" >> $HW_FILE

          # =================================
          # КРОК 0. HARD PIN RELEASE FOR HAKRC REMAP (Выжигание фабричных коллизий за номерами ног)
          # Очищаем только те ноги, которые мы явно перевизначаем под мапинг HAKRC.
          # Фабричные строки SPIDEV и блоки IMU/OSD/Flash мы НЕ трогаем, сохраняя совместимость с 4.8.0!
          # =================================
          for PIN in PB12 PB13 PB14 PB15 PC10 PC11 PB5 PA15 PC13 PC14 PC15 PB6 PB7 PB10 PB11 PC1 PC3 PB4 PB3 PB0 PB1 PC8 PC9 PA8 PA9 PA10 PA2 PA3 PC12 PD2 PC6 PC7 PC0 PC2
          do
              sed -i "/^[[:space:]]*$PIN[[:space:]]/d" $HW_FILE
              sed -i "/^[[:space:]]*$PIN$/d" $HW_FILE
          done
          
          # =================================
          # ПОВНЕ ВЫРЕЗАНИЕ PINIO, БУЗЕРА ТА СИСТЕМЫ ЛОГУВАННЯ БЛЕКБОКСА (За вашим планом!)
          # Выжигаем все фабричные абстракции, CS и дефайны логгера, освобождая ОЗУ под миссии
          # =================================
          sed -i '/[Dd][Aa][Vv][Aa][Ff][尝][Aa][Ss][Hh]/d' $HW_FILE
          sed -i '/dataflash/d' $HW_FILE
          sed -i '/FLASH1_CS/d' $HW_FILE
          sed -i '/HAL_LOGGING_DATAFLASH/d' $HW_FILE
          sed -i '/PINIO/d' $HW_FILE
          sed -i '/BUZZER/d' $HW_FILE
          sed -i '/HAL_BUZZER_PIN/d' $HW_FILE
          sed -i '/SBUS_INVERT/d' $HW_FILE
          
          # Жестко вырезаем старые фабричные шкалы Foxeer, убирая коллизию 'Macro redefined'
          sed -i '/HAL_BATT_VOLT_SCALE/d' $HW_FILE
          sed -i '/HAL_BATT_CURR_SCALE/d' $HW_FILE
          
          # Очищаем старые SPIDEV OSD/Flash, но категорически НЕ трогаем imu1 / gyro1!
          sed -i '/[Oo][Ss][Dd]/d' $HW_FILE
          sed -i '/GYRO2/d;/GYRO2_CS/d;/BMI270_DRDY/d;/imu2/d' $HW_FILE
          
          # Удаляем дублирующиеся системные дефайны Foxeer, чтобы препроцессор не выдавал ошибки
          sed -i '/HAL_GPIO_A_LED_PIN/d' $HW_FILE
          sed -i '/HAL_GPIO_B_LED_PIN/d' $HW_FILE
          sed -i '/HAL_BATT_VOLT_PIN/d' $HW_FILE
          sed -i '/HAL_BATT_CURR_PIN/d' $HW_FILE
          sed -i '/AP_NOTIFY_GPIO_LED_2_ENABLED/d' $HW_FILE
          sed -i '/DEFAULT_NTF_LED_TYPES/d' $HW_FILE
          
          # Вырезаем старые UART порты Foxeer и старый PWM блок под чистую инжекцию HAKRC
          sed -i '/USART1_TX/d;/USART1_RX/d' $HW_FILE
          sed -i '/USART3_TX/d;/USART3_RX/d' $HW_FILE
          sed -i '/UART5_TX/d;/UART5_RX/d' $HW_FILE
          sed -i '/PWM(/d' $HW_FILE
          sed -i '/PA13 LED_BOOTLOADER/d' $BL_FILE

          # ===============================
          # КРОК 1. ИНЖЕКЦИЯ ТИЛЬКИ НОМЕРОВ ФИЗИЧЕСКИХ НИЖОК ШИН SPI2 ТА SPI3 HAKRC
          # Фабричные строки SPIDEV для IMU/OSD остаются оригинальными — парсер 4.8.0 примет их идеально!
          # ===============================
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 SPI REMAP ===
          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS CS

          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS
          EOF
          
          # ===============================
          # КРОК 2. UART REMAP (Чистый 3-компонентный апаратный синтаксис под STM32F405)
          # ===============================
          cat >> $HW_FILE <<EOF

          # === HAKRC UART MAP ===
          PB6  USART1_TX USART1
          PB7  USART1_RX USART1

          PA2  USART2_TX USART2
          PA3  USART2_RX USART2

          PB11 USART3_RX USART3 NODMA

          PC12 UART5_TX UART5
          PD2  UART5_RX UART5

          PC6  USART6_TX USART6
          PC7  USART6_RX USART6
          EOF

          # ===============================
          # КРОК 3. АНАЛОГОВІ ДАТЧИКИ БАТАРЕЇ (Идеальный одиночный комплект строго по вашему плану!)
          # ===============================
          cat >> $HW_FILE <<EOF

          # === HAKRC ANALOG ADC SENSORS ===
          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)

          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13

          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0
          EOF
          
          # ===============================
          # КРОК 4. СВЕТОДИОДЫ ТА AP_NOTIFY (Полная очистка от PINIO и Бузера)
          # ===============================
          cat >> $HW_FILE <<EOF

          # === HAKRC SYSTEM LEDs ===
          PC14 LED1 OUTPUT LOW
          PC15 LED0 OUTPUT LOW

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          EOF
          
          # ===============================
          # КРОК 5. КАРТА МОТОРОВ PWM (Таймеры TIM8/TIM1/TIM3 строго по Betaflight дампу)
          # ===============================
          cat >> $HW_FILE <<EOF

          # === HAKRC PWM MOTOR OUTPUTS ===
          PC8  TIM8_CH3 TIM8 PWM(1)
          PC9  TIM8_CH4 TIM8 PWM(2)

          PA8  TIM1_CH1 TIM1 PWM(3)
          PA9  TIM1_CH2 TIM1 PWM(4)

          PB0  TIM3_CH3 TIM3 PWM(5)
          PB1  TIM3_CH4 TIM3 PWM(6)

          PA10 TIM1_CH3 TIM1 PWM(7)

          PB4  TIM3_CH1 TIM3 PWM(8)

          PB3  TIM2_CH2 TIM2 PWM(9)
          EOF
          
          # ===============================
          # КРОК 6. ПОВНЕ ВИМКНЕННЯ СИСТЕМЫ ЛОГГЕРА ТА ЗБЕРЕЖЕННЯ ЛОГІВ
          # ===============================
          cat >> $HW_FILE <<EOF

          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF
          
          # ===============================
          # ОВЕРРАЙД СВЕТОДИОДА ЗАВАНТАЖУВАЧА
          # ===============================
          cat >> $BL_FILE <<EOF

          # --- HAKRC Bootloader Overrides ---
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF
          
          echo "=== HAKRC REMAP PATCH DONE ==="

      # 4. Диагностический контроль перед вызовом waf
      - name: Diagnostics and Resource Verification
        run: |
          echo "=== CHECKING KEY PINS FOR DUPLICATES ==="
          grep -nE "PA2|PB14|PC12" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== VERIFY BUZZER & PINIO ARE DELETED ==="
          grep -iE "buzzer|pinio|imu2" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== CHECKING REVISED TEXTUAL BOARD_ID ==="
          grep "APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== VERIFYING BATTERY SCALE CONFIGURATION ==="
          grep -n "SCALE" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true

      # 5. Сброс кэша и конфигурация загрузчика
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 6. Финальная компиляция завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 7. Настройка defaults.parm под ядро 4.8.0 (LOG_BACKEND_TYPE 0 - логи вымкнено повністю, OSD працює)
      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << 'EOF_PARM' > $PARM_FILE
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          # Completely clean config with logging disabled to save RAM for Auto Missions
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 0
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          
          # Опции тумблеров радиоуправления для стабильного Arming/Disarm и отключения GPS под 4.8.0
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          echo "Production defaults.parm locked."

      # 8. Очитка кешу та конфігурація основної прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 9. Финальная компиляция основної прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: ./waf copter

      # 10. Экспортируем готовые .apj та .bin файлы в артефакты запуска GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
