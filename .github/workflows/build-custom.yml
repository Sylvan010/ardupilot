name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория FoxeerF405v2 (100% фабричное состояние)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Полное выжигание старых ресурсов и инжекция чистой карты HAKRC (SPI, LED, OSD)
      - name: Modify Hardware for HAKRC
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          
          # === КРОК 0. ВЫЖИГАНИЕ КОНФЛИКТНЫХ НОГ И СТАРЫХ АБСТРАКЦИЙ ===
          # Стираем любые упоминания физических пинов новых шин SPI, светодиодов и бузера
          sed -i '/PB14/d' $HW_FILE
          sed -i '/PB15/d' $HW_FILE
          sed -i '/PB13/d' $HW_FILE
          sed -i '/PB12/d' $HW_FILE
          
          sed -i '/PC10/d' $HW_FILE
          sed -i '/PC11/d' $HW_FILE
          sed -i '/PB5/d' $HW_FILE
          sed -i '/PA15/d' $HW_FILE
          
          sed -i '/PC13/d' $HW_FILE
          sed -i '/PC14/d' $HW_FILE
          sed -i '/PC15/d' $HW_FILE
          
          # Очищаем старые SPIDEV, CS и логгер, чтобы исключить дублирование структур
          sed -i '/SPIDEV.*osd/d' $HW_FILE
          sed -i '/SPIDEV.*dataflash/d' $HW_FILE
          sed -i '/OSD1_CS/d' $HW_FILE
          sed -i '/FLASH1_CS/d' $HW_FILE
          sed -i '/HAL_LOGGING_DATAFLASH/d' $HW_FILE
          
          # Стираем старый светодиод из завантажувача (Bootloader LED)
          sed -i '/PA13 LED_BOOTLOADER/d' $BL_FILE

          # === КРОК 1. ИНЖЕКЦИЯ ЧИСТОЙ КАРТЫ SPI (Строго по замерам вашего мультиметра) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 VERIFIED SPI MAP ===
          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2

          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3

          PA15 FLASH1_CS CS
          PB12 OSD1_CS CS

          SPIDEV osd       SPI2 DEVID1 OSD1_CS MODE0 10*MHZ LOW
          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ LOW
          EOF

          # === КРОК 2. ИНЖЕКЦИЯ СИСТЕМНЫХ СВЕТОДИОДОВ HAKRC ===
          cat >> $HW_FILE <<EOF

          # === HAKRC SYSTEM LEDs ===
          PC15 LED0 OUTPUT LOW
          PC14 LED1 OUTPUT LOW

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          EOF

          # === КРОК 3. ПРОГРАММНОЕ ОТКЛЮЧЕНИЕ BLACKBOX ЛОГГЕРА (По вашему плану) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC DISABLE LOGGING BACKEND ===
          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF

          # === КРОК 4. ОВЕРРАЙД СВЕТОДИОДА ЗАВАНТАЖУВАЧА (Bootloader LED на PC15) ===
          cat >> $BL_FILE <<EOF

          # --- HAKRC Bootloader Overrides ---
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF

          # === КРОК 5. КОРРЕКЦИЯ DEFAULTS.PARM (Включаем OSD, тушим блекбокс) ===
          if [ ! -f "$PARM_FILE" ]; then
            touch "$PARM_FILE"
          fi
          echo "NTF_LED_TYPES 257" >> $PARM_FILE
          echo "NTF_LED_BRIGHT 2" >> $PARM_FILE
          echo "OSD_TYPE 1" >> $PARM_FILE
          echo "LOG_BACKEND_TYPE 0" >> $PARM_FILE
          
          echo "=== STEP 1: RESOUCE CLEAN & INJECTION COMPLETED ==="

      # 4. Тестовый проход конфигурации (Проверяем заголовки, MCU и отсутствие коллизий SPI/LED)
      - name: Configure Target Test
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 5. Глубокий контроль успешности генерации аппаратного графа ChibiOS
      - name: Check Generated Hardware h-Files
        run: |
          echo "=== VERIFYING GENERATED HEADERS ==="
          test -f build/FoxeerF405v2/hwdef.h
          grep -R "OSD1_CS" build/FoxeerF405v2/ || true
          grep -R "FLASH1_CS" build/FoxeerF405v2/ || true
          echo "Success! The ChibiOS generator configuration step passed successfully."
