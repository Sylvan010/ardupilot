name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистий checkout оригінального репозиторію з усіма субмодулями
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки всередині Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Чистий ресурсний мапінг HAKRC поверх Foxeer (Ідеальна конфігурація AP_Notify та OSD)
      - name: Modify Hardware for HAKRC
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          
          # --- ШАГ 1. СВЕТОДИОДЫ И ИХ ПРИВЯЗКА К AP_NOTIFY (HAKRC Layout) ---
          sed -i 's/PA13 LED0 OUTPUT LOW/PC15 LED0 OUTPUT LOW GPIO(90)/g' $HW_FILE
          sed -i 's/PA14 LED1 OUTPUT LOW/PC14 LED1 OUTPUT LOW GPIO(91)/g' $HW_FILE
          
          # Дописываем макросы привязки Notify LED в основной hwdef
          echo "" >> $HW_FILE
          echo "# HAKRC AP_Notify LED Configuration" >> $HW_FILE
          echo "define HAL_GPIO_A_LED_PIN 90" >> $HW_FILE
          echo "define HAL_GPIO_B_LED_PIN 91" >> $HW_FILE
          
          # Корректируем светодиод завантажувача (Bootloader LED)
          sed -i 's/PA13 LED_BOOTLOADER OUTPUT LOW/PC15 LED_BOOTLOADER OUTPUT LOW/g' $BL_FILE
          
          # --- ШАГ 2. НАСТРОЙКА DEFAULTS.PARM ДЛЯ СВЕТОДИОДОВ И OSD ---
          # Создаем файл параметров, если его не было, или дописываем битовую маску мапинга 257
          if [ ! -f "$PARM_FILE" ]; then
            touch "$PARM_FILE"
          fi
          echo "NTF_LED_TYPES 257" >> $PARM_FILE
          echo "NTF_LED_BRIGHT 2" >> $PARM_FILE
          echo "BATT_MONITOR 4" >> $PARM_FILE
          echo "BATT_VOLT_PIN 11" >> $PARM_FILE
          echo "BATT_CURR_PIN 13" >> $PARM_FILE
          echo "OSD_TYPE 1" >> $PARM_FILE
          
          # --- ШАГ 3. UART ИНТЕРФЕЙСЫ ---
          sed -i 's/PA9  USART1_TX/PB6  USART1_TX/g' $HW_FILE
          sed -i 's/PA10 USART1_RX/PB7  USART1_RX/g' $HW_FILE
          sed -i 's/PC10 USART3_TX/PB10 USART3_TX/g' $HW_FILE
          sed -i 's/PC11 USART3_RX/PB11 USART3_RX/g' $HW_FILE

          # --- ШАГ 4. АНАЛОГОВЫЕ ДАТЧИКИ БАТАРЕИ (ADC) ---
          sed -i 's/PC0 BATT_VOLTAGE_SENS/PC1 BATT_VOLTAGE_SENS/g' $HW_FILE
          sed -i 's/PC1 BATT_CURRENT_SENS/PC3 BATT_CURRENT_SENS/g' $HW_FILE
          sed -i 's/define HAL_BATT_VOLT_PIN 10/define HAL_BATT_VOLT_PIN 11/g' $HW_FILE
          sed -i 's/define HAL_BATT_CURR_PIN 11/define HAL_BATT_CURR_PIN 13/g' $HW_FILE

          # --- ШАГ 5. ШИНЫ SPI ДЛЯ OSD И FLASH ---
          sed -i 's/PC2  SPI2_MISO/PB14 SPI2_MISO/g' $HW_FILE
          sed -i 's/PC3  SPI2_MOSI/PB15 SPI2_MOSI/g' $HW_FILE
          sed -i 's/PB3  SPI3_SCK/PC10 SPI3_SCK/g' $HW_FILE
          sed -i 's/PB4  SPI3_MISO/PC11 SPI3_MISO/g' $HW_FILE
          
          # Перекидываем линии Chip Select (CS)
          sed -i 's/PB12 FLASH1_CS/PA15 FLASH1_CS/g' $HW_FILE
          sed -i 's/PC14 OSD1_CS/PB12 OSD1_CS/g' $HW_FILE
          
          # Направляем SPIDEV абстракции на физические шины HAKRC
          sed -i 's/SPIDEV dataflash SPI2/SPIDEV dataflash SPI3/g' $HW_FILE
          sed -i 's/SPIDEV osd       SPI3/SPIDEV osd       SPI2/g' $HW_FILE

          # --- ШАГ 6. ТОЧЕЧНОЕ ОТКЛЮЧЕНИЕ BLACKBOX ЛОГГЕРА (По твоему плану) ---
          sed -i 's/define HAL_LOGGING_DATAFLASH_ENABLED 1/define HAL_LOGGING_DATAFLASH_ENABLED 0/g' $HW_FILE

          # --- ШАГ 7. ПОЛНАЯ КАРТА ДВИГАТЕЛЕЙ PWM (Таймеры TIM8/TIM1/TIM3 из Betaflight) ---
          sed -i 's/PA8  TIM1_CH1 TIM1 PWM(1)/PC8  TIM8_CH3 TIM8 PWM(1)/g' $HW_FILE
          sed -i 's/PC9  TIM8_CH4 TIM8 PWM(2)/PC9  TIM8_CH4 TIM8 PWM(2)/g' $HW_FILE
          sed -i 's/PC8  TIM8_CH3 TIM8 PWM(3)/PA8  TIM1_CH1 TIM1 PWM(3)/g' $HW_FILE
          sed -i 's/PB15 TIM1_CH3N TIM1 PWM(4)/PA9  TIM1_CH2 TIM1 PWM(4)/g' $HW_FILE
          sed -i 's/PB6  TIM4_CH1 TIM4 PWM(5)/PB0  TIM3_CH3 TIM3 PWM(5)/g' $HW_FILE
          sed -i 's/PA15 TIM2_CH1 TIM2 PWM(6)/PB1  TIM3_CH4 TIM3 PWM(6)/g' $HW_FILE
          sed -i 's/PB11 TIM2_CH4 TIM2 PWM(7)/PA10 TIM1_CH3 TIM1 PWM(7)/g' $HW_FILE
          sed -i 's/PB10 TIM2_CH3 TIM2 PWM(8)/PB4  TIM3_CH1 TIM3 PWM(8)/g' $HW_FILE
          sed -i 's/PB1  TIM3_CH4 TIM3 PWM(9)/PB3  TIM2_CH2 TIM2 PWM(9)/g' $HW_FILE
          
          echo "=== PRODUCTION HAKRC CONFIG WITH PERFECT NOTIFY LEDS GENERATED ==="

      # 4. Полный сброс кэша графа и чистая конфигурация/сборка загрузчика
      - name: Build Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      # 5. Сброс кэша графа и чистая ... сборка основной прошивки Copter
      - name: Build Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 6. Выгрузка готовой прошивки в артефакты запуска GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
