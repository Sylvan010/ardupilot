name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория FoxeerF405v2 (100% фабричное состояние)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Чистый, точечный хирургический патчинг HAKRC поверх оригинального hwdef Foxeer
      - name: Patch FoxeerF405v2 to HAKRC F405V2
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          
          echo "=== HAKRC REMAP PATCH START ==="
          
          # Создаем бэкап оригинального файла по вашему плану
          cp $HW_FILE ${HW_FILE}.backup
          
          # =================================
          # 1. BOARD ID КОРРЕКЦИЯ
          # =================================
          sed -i '/APJ_BOARD_ID/d' $HW_FILE
          echo "APJ_BOARD_ID 1067" >> $HW_FILE

          # =================================
          # 2. ОСВОБОЖДАЕМ КОНФЛИКТНЫЕ НОГИ И СТАРЫЕ ШАБЛОНЫ (Строго по плану)
          # =================================
          sed -i '/SPI2_/d' $HW_FILE
          sed -i '/SPI3_/d' $HW_FILE
          sed -i '/OSD1_CS/d' $HW_FILE
          sed -i '/FLASH1_CS/d' $HW_FILE
          sed -i '/dataflash/d' $HW_FILE
          sed -i '/osd/d' $HW_FILE
          sed -i '/HAL_LOGGING_DATAFLASH/d' $HW_FILE
          
          # Зачищаем старые UART интерфейсы
          sed -i '/USART1_TX/d;/USART1_RX/d' $HW_FILE
          sed -i '/USART3_TX/d;/USART3_RX/d' $HW_FILE
          sed -i '/UART5_TX/d;/UART5_RX/d' $HW_FILE
          
          # Зачищаем старый маппинг АЦП (ADC)
          sed -i '/BATT_VOLTAGE_SENS/d' $HW_FILE
          sed -i '/BATT_CURRENT_SENS/d' $HW_FILE
          sed -i '/HAL_BATT_VOLT_PIN/d' $HW_FILE
          sed -i '/HAL_BATT_CURR_PIN/d' $HW_FILE

          # Зачищаем старые LED / Бузер
          sed -i '/LED0/d;/LED1/d;/BUZZER/d' $HW_FILE
          sed -i '/HAL_GPIO_A_LED_PIN/d' $HW_FILE
          sed -i '/HAL_GPIO_B_LED_PIN/d' $HW_FILE
          sed -i '/HAL_BUZZER_PIN/d' $HW_FILE

          # Зачищаем линии таймеров моторов PWM Foxeer
          sed -i '/PWM(/d' $HW_FILE
          
          # Вырезаем второй гироскоп Foxeer, если он пересекался по ногам с HAKRC
          sed -i '/GYRO2_CS/d' $HW_FILE
          sed -i '/BMI270_DRDY/d' $HW_FILE
          
          # Стираем старый светодиод из загрузчика (Bootloader LED)
          sed -i '/PA13 LED_BOOTLOADER/d' $BL_FILE

          # =================================
          # 3. SPI HAKRC ИНЖЕКЦИЯ (Подтверждено мультиметром)
          # =================================
          cat >> $HW_FILE <<EOF

          # HAKRC MAX7456 OSD SPI2
          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS CS

          SPIDEV osd SPI2 DEVID1 OSD1_CS MODE0 10*MHZ

          # HAKRC W25Q128 FLASH SPI3
          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS

          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ
          EOF

          # =================================
          # 4. UART HAKRC ИНЖЕКЦИЯ (Канонический синтаксис 4.8.0 для UART5)
          # =================================
          cat >> $HW_FILE <<EOF

          # HAKRC UART MAP
          PB6 USART1_TX USART1
          PB7 USART1_RX USART1

          PA2 USART2_TX USART2
          PA3 USART2_RX USART2

          PB11 USART3_RX USART3 NODMA

          PC12 UART5_TX UART5
          PD2  UART5_RX UART5
          EOF

          # =================================
          # 5. ДВУХКОНТУРНЫЙ IMU (Добавляем Gyro2 строго по вашему Betaflight дамп)
          # =================================
          cat >> $HW_FILE <<EOF

          # HAKRC SECOND ALTERNATIVE GYRO (SPI1)
          PB2  GYRO2_CS CS
          PB10 BMI270_DRDY INPUT

          SPIDEV imu2 SPI1 DEVID2 GYRO2_CS MODE3 8*MHZ
          IMU BMI270 SPI:imu2 ROTATION_PITCH_180_YAW_90
          EOF

          # =================================
          # 6. ADC HAKRC ИНЖЕКЦИЯ (Шкалы датчиков батареи)
          # =================================
          cat >> $HW_FILE <<EOF

          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)

          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13

          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0
          EOF

          # =================================
          # 7. LED / BUZZER / PINIO HAKRC ИНЖЕКЦИЯ
          # =================================
          cat >> $HW_FILE <<EOF

          PC14 LED1 OUTPUT LOW
          PC15 LED0 OUTPUT LOW

          PC13 BUZZER OUTPUT GPIO(80) LOW
          define HAL_BUZZER_PIN 80

          PC0 PINIO1 OUTPUT LOW GPIO(81)
          PC2 PINIO2 OUTPUT LOW GPIO(82)

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          EOF

          # =================================
          # 8. PWM HAKRC ИНЖЕКЦИЯ (Чистый синтаксис без GPIO() макросов)
          # =================================
          cat >> $HW_FILE <<EOF

          PC8  TIM8_CH3 TIM8 PWM(1)
          PC9  TIM8_CH4 TIM8 PWM(2)

          PA8  TIM1_CH1 TIM1 PWM(3)
          PA9  TIM1_CH2 TIM1 PWM(4)

          PB0  TIM3_CH3 TIM3 PWM(5)
          PB1  TIM3_CH4 TIM3 PWM(6)

          PA10 TIM1_CH3 TIM1 PWM(7)

          PB4  TIM3_CH1 TIM3 PWM(8)

          PB3  TIM2_CH2 TIM2 PWM(9)
          EOF

          # =================================
          # 9. BLACKBOX ПРОГРАММНОЕ ВЫКЛЮЧЕНИЕ
          # =================================
          cat >> $HW_FILE <<EOF

          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF

          # =================================
          # 10. BOOTLOADER LED OVERRIDE
          # =================================
          cat >> $BL_FILE <<EOF

          # --- HAKRC Bootloader Overrides ---
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF
          
          echo "=== HAKRC REMAP PATCH DONE ==="

      # 4. Диагностический контроль перед вызовом waf
      - name: Diagnostics and Resource Verification
        run: |
          echo "=== DIAGNOSTICS: GREP FOR PB14 ==="
          grep -n "PB14" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== DIAGNOSTICS: GREP FOR UART5 ==="
          grep -n "UART5" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=== DIAGNOSTICS: GREP FOR PWM ==="
          grep -n "PWM" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true

      # 5. Сброс кэша и конфигурация загрузчика
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 6. Проверка згенерованного кода загрузчика за физическими линиями
      - name: Check Generated Bootloader Hardware
        run: |
          echo "=== CHECKING GENERATED BOOTLOADER DEFINITIONS ==="
          grep -R "PC15" build/FoxeerF405v2/ || true

      # 7. Финальна компіляція завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 8. Настройка defaults.parm под ядро 4.8.0 (LOG_BACKEND_TYPE 1, OSD включено, RC тумблеры залочены)
      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << 'EOF_PARM' > $PARM_FILE
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 1
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          
          # Опции тумблеров радиоуправления для стабильного Arming/Disarm и отключения GPS
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          echo "Production defaults.parm locked."

      # 9. Очитка кэша и конфигурация основной прошивки квадрокоптера
      - name: Configure and Build Copter
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 10. Экспортируем готовые .apj и .bin файлы в артефакты запуска GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
