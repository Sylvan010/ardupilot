name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Завантажуємо вихідний код вашої гілки репозиторію з усіма субмодулями (Foxeer таргет 100% заводський)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Безпечне відновлення патчу з Base64 (0% шансів зламати YAML синтаксис)
      - name: Create HAKRC Resource Patch File via Base64
        run: |
          echo "" | base64 -d > hakrc_resources.patch

      # 4. Діагностичний крок: перевіряємо статистику відновленого патчу
      - name: Debug Patch File
        run: |
          test -f hakrc_resources.patch
          head -n 20 hakrc_resources.patch
          git apply --stat hakrc_resources.patch

      # 5. Накладаємо патч у розширеному (verbose) режимі з попередньою перевіркою
      - name: Apply HAKRC Resource Patch
        run: |
          git apply --check --verbose hakrc_resources.patch
          git apply --verbose hakrc_resources.patch

      # 6. Хірургічна верифікація: суворо перевіряємо наявність нових пінів без зайвого виводу (grep -q)
      - name: Verify HAKRC Mapping
        run: |
          grep -q "PB6  USART1_TX" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PB12 OSD1_CS CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PA15 FLASH1_CS CS" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PC15 LED0" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PC13 BUZZER" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PC8  TIM8_CH3" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          grep -q "PC15 LED_BOOTLOADER" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat
          echo "Verification successful! All HAKRC resources integrated."

      # 7. Скидання кешу та конфігурація завантажувача
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 8. Перевірка згенерованого ChibiOS-коду за фізичними лініями
      - name: Check Generated Bootloader Hardware
        run: |
          echo "=== CHECKING GENERATED BOOTLOADER DEFINITIONS ==="
          grep -R "PC15" build/FoxeerF405v2/ || true

      # 9. Фінальна компіляція завантажувача
      - name: Build Bootloader
        run: ./waf bootloader

      # 10. Очистка кешу та конфігурація основної прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 11. Перевірка згенерованого ChibiOS-коду для коптера за фізичними лініями моторів та OSD
      - name: Check Generated Copter Hardware
        run: |
          echo "=== CHECKING GENERATED COPTER DEFINITIONS ==="
          grep -R "PC8" build/FoxeerF405v2/ || true
          grep -R "PB12" build/FoxeerF405v2/ || true

      # 12. Фінальна компіляція основної прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: ./waf copter

      # 13. Експортуємо готові .apj та .bin файли в артефакти GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
