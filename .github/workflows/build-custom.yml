name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория FoxeerF405v2 (100% фабричное состояние)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Полное обнуление файла и инжекция чистой карты HAKRC под 4.8.0 (С суровым 3-компонентным синтаксисом UART5)
      - name: Modify Hardware for HAKRC
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          
          # Жёсткое обнуление файла Foxeer — вычищает абсолютно всё, исключая скрытые дубли
          truncate -s 0 $HW_FILE
          
          # Запись монолитной карты HAKRC строго по канонам ChibiOS 4.8.0
          cat << 'EOF' > $HW_FILE
          # hw definition file for processing by chibios_hwdef.py
          # Target: FoxeerF405v2 - Custom Production Build for HAKRC-F405V2 Layout
          # Base architecture keeps original DMA rules, USB, and core branch features intact.
          
          MCU STM32F4xx STM32F405xx
          
          # === HAKRC FIXED MEMORY LAYOUT & BOARD ID ===
          APJ_BOARD_ID 1067
          
          FLASH_SIZE_KB 1024
          FLASH_RESERVE_START_KB 48
          FLASH_BOOTLOADER_LOAD_KB 48
          
          OSCILLATOR_HZ 8000000
          STM32_ST_USE_TIMER 5
          HAL_STORAGE_SIZE 15360
          
          define CONFIG_HAL_BOARD_SUBTYPE HAL_BOARD_SUBTYPE_CHIBIOS_HWDEF
          define STM32_HSE_ENABLED TRUE
          define STM32_HSECLK 8000000
          
          ENV_SIZE 16k
          
          # USB VCP Конфигурация
          PA11 OTG_FS_DM OTG1
          PA12 OTG_FS_DP OTG1
          
          define USB_VENDOR 0x0483
          define USB_PRODUCT_ID 0x5740
          define USB_STRING_MANUFACTURER "HAKRC"
          define USB_STRING_PRODUCT "HAKRCF405V2"
          
          SERIAL_ORDER OTG1 USART1 USART2 USART3 UART4 USART5 USART6
          
          # --- UART/USART Mapping (Суровый 3-компонентный синтаксис для UART5 под ядро 4.8.0) ---
          PB6  USART1_TX USART1
          PB7  USART1_RX USART1
          
          PA2  USART2_TX USART2
          PA3  USART2_RX USART2
          PC0  SBUS_INVERT OUTPUT LOW
          
          PB10 USART3_TX USART3
          PB11 USART3_RX USART3 NODMA
          
          PA0  UART4_TX UART4
          PA1  UART4_RX UART4
          
          PC12 UART5_TX UART5
          PD2  UART5_RX UART5
          
          PC6  USART6_TX USART6
          PC7  USART6_RX USART6
          
          # Шина I2C1 (Для внешнего компаса и барометра)
          PB8 I2C1_SCL I2C1
          PB9 I2C1_SDA I2C1
          
          # SPI1: Главный сенсор положения (IMU Гироскоп)
          PA5 SPI1_SCK SPI1
          PA6 SPI1_MISO SPI1
          PA7 SPI1_MOSI SPI1
          PA4 GYRO1_CS CS
          
          # SPI2: Analog OSD MAX7456 (Строго по прозвонке мультиметра)
          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS CS
          
          # SPI3: Бортовая Flash Blackbox память W25Q128 (Строго по прозвонке мультиметра)
          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS
          
          # Регистрация абстракции устройств на SPI шинах под требования парсера 4.8.0
          SPIDEV gyro1      SPI1 SPEED_2M SPEED_8M GYRO1_CS LOW
          SPIDEV osd       SPI2 DEVID1 OSD1_CS MODE0 10*MHZ
          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ
          
          # EXTI линия аппаратного перерывания гироскопа
          PC4 MPU6000_DRDY INPUT
          
          # Драйверы сенсоров полета с ориентацией Pitch 180 + Yaw 90 соответственно до Foxeer
          IMU Invensensev3 SPI:gyro1 ROTATION_PITCH_180_YAW_90
          
          # Барометры на шине I2C1
          BARO BMP280 I2C:0:0x76
          BARO DPS310 I2C:0:0x76
          BARO SPL06  I2C:0:0x76
          
          # --- Выключение логурования блекбокса на уровне ядра автопилота ---
          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          
          # --- Конфигурация АЦП датчиков напруги та струму (ADC1 Канали 11 та 13) ---
          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)
          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13
          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0
          
          # --- Статусные светодиоды и аппаратный бузер HAKRC (С явными GPIO индексами) ---
          PC15 LED0 OUTPUT LOW GPIO(90)
          PC14 LED1 OUTPUT LOW GPIO(91)
          PC13 BUZZER OUTPUT GPIO(80) LOW
          define HAL_BUZZER_PIN 80
          
          # Конфигурация AP_Notify для Matek-style поведінки світлодіодів
          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          define AP_NOTIFY_GPIO_LED_2_ENABLED 1
          define DEFAULT_NTF_LED_TYPES 257
          
          # --- Повна карта апаратних таймерів для PWM виходів (Строго за Betaflight Dump) ---
          PC8  TIM8_CH3 TIM8 PWM(1) GPIO(50)
          PC9  TIM8_CH4 TIM8 PWM(2) GPIO(51)
          PA8  TIM1_CH1 TIM1 PWM(3) GPIO(52)
          PA9  TIM1_CH2 TIM1 PWM(4) GPIO(53)
          PB0  TIM3_CH3 TIM3 PWM(5) GPIO(54)
          PB1  TIM3_CH4 TIM3 PWM(6) GPIO(55)
          PA10 TIM1_CH3 TIM1 PWM(7) GPIO(56)
          PB4  TIM3_CH1 TIM3 PWM(8) GPIO(57)
          PB3  TIM2_CH2 TIM2 PWM(9) GPIO(58)
          
          # === СЛУЖБОВІ НАЛАШТУВАННЯ ТА КАРТИ DMA (БЕЗКОНФЛІКТНІ) ===
          DMA_PRIORITY SPI1_RX SPI1_TX SPI2_RX SPI2_TX SPI3_RX SPI3_TX TIM* USART1* USART2* USART3* UART4* UART5* USART6*
          DMA_NOSHARE SPI1_RX SPI1_TX ADC1
          
          # --- OSD Инфраструктура ---
          define OSD_ENABLED 1
          define HAL_OSD_TYPE_DEFAULT 1
          ROMFS_WILDCARD libraries/AP_OSD/fonts/font*.bin
          
          # --- Навигация, автомиссии и компас ---
          define ALLOW_ARM_NO_COMPASS
          define AP_COMPASS_PROBING_ENABLED 1
          define HAL_I2C_INTERNAL_MASK 0
          define HAL_COMPASS_AUTO_ROT_DEFAULT 2
          define HAL_DEFAULT_INS_FAST_SAMPLE 3
          define HAL_FRAME_TYPE_DEFAULT 12
          
          include ../include/minimize_fpv_osd.inc
          EOF
          
          # Точечная замена светодиода и BOARD_ID в загрузчике (hwdef-bl.dat)
          sed -i '/PA13/d' $BL_FILE
          sed -i '/define HAL_LED_ON/i PC15 LED_BOOTLOADER OUTPUT LOW' $BL_FILE
          sed -i 's/APJ_BOARD_ID AP_HW_FOXEERF405_V2/APJ_BOARD_ID 1067/g' $BL_FILE
          echo "=== MONOLITHIC INJECTION COMPLETED PERFECTLY ==="

      # 4. Диагностический контроль: выводим порты та проверяем уникальность PB14
      - name: Diagnostics and Resource Verification
        run: |
          echo "=== VERIFYING UART CONFIGURATION ==="
          grep "UART\|USART" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "=== VERIFYING PB14 IS ISOLATED ==="
          grep "PB14" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat

      # 5. Сброс кэша и конфигурация загрузчика
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 6. Проверка сгенерированного кода загрузчика
      - name: Check Generated Bootloader Hardware
        run: |
          echo "=== CHECKING GENERATED BOOTLOADER DEFINITIONS ==="
          grep -R "PC15" build/FoxeerF405v2/ || true

      # 7. Финальная компиляция загрузчика
      - name: Build Bootloader
        run: ./waf bootloader

      # 8. Очистка кэша и конфигурация основной прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 9. Проверка сгенерированного кода для коптера по ключевым линиям моторов и OSD
      - name: Check Generated Copter Hardware
        run: |
          echo "=== CHECKING GENERATED COPTER DEFINITIONS ==="
          grep -R "PC8" build/FoxeerF405v2/ || true
          grep -R "PB12" build/FoxeerF405v2/ || true

      # 10. Настройка defaults.parm под ядро 4.8.0 (Включаем OSD, тушим блекбокс, настраиваем RC опции тумблеров)
      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << 'EOF_PARM' > $PARM_FILE
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 1
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          
          # Опции тумблеров радиоуправления для стабильного Arming/Disarm и отключения GPS
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          echo "Production defaults.parm locked."

      # 11. Финальная компиляция основной прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: ./waf copter

      # 12. Экспортируем готовые .apj и .bin файлы в артефакты запуска GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
