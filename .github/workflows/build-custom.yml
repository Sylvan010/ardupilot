name: Build Custom Production Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Inject Pure HAKRC Hardware Profile
        run: |
          echo "=== OVERWRITING FOXEER SKELETON WITH HAKRC WIRING COMPATIBILITY LAYER ==="
          TARGET_DIR="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2"
          
          git checkout -- $TARGET_DIR/hwdef.dat $TARGET_DIR/hwdef-bl.dat
          
          cat << EOF > $TARGET_DIR/hwdef.dat
          MCU STM32F4xx STM32F405xx
          PRODUCT_ID 0x5740
          VENDOR_ID 0x0483
          OSCILLATOR_HZ 8000000
          STM32_ST_USE_TIMER 5
          FLASH_SIZE_KB 1024
          APJ_BOARD_ID AP_HW_FOXEERF405_V2
          PA11 OTG_FS_DM OTG1
          PA12 OTG_FS_DP OTG1

          PA5  SPI1_SCK  SPI1
          PA6  SPI1_MISO SPI1
          PA7  SPI1_MOSI SPI1
          PA4  GYRO1_CS  CS
          PB10 ICM42688_DRDY INPUT

          SPIDEV imu1 SPI1 DEVID1 GYRO1_CS MODE3 1*MHZ 8*MHZ
          IMU Invensensev3 SPI:imu1 ROTATION_PITCH_180_YAW_90

          PB13 SPI2_SCK  SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS   CS
          SPIDEV osd SPI2 DEVID1 OSD1_CS MODE0 10*MHZ 10*MHZ

          PC10 SPI3_SCK  SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS
          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ 40*MHZ

          PB8 I2C1_SCL I2C1
          PB9 I2C1_SDA I2C1
          BARO DPS310 I2C:0:0x76
          COMPASS QMC5883 I2C:0:0x0D

          PB6  USART1_TX USART1
          PB7  USART1_RX USART1
          PA2  USART2_TX USART2
          PA3  USART2_RX USART2
          PC0  SBUS_INVERT OUTPUT LOW
          PB10 USART3_TX USART3
          PB11 USART3_RX USART3 NODMA
          PC12 UART5_TX USART5
          PD2  UART5_RX USART5
          PC6  USART6_TX USART6
          PC7  USART6_RX USART6

          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)
          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13
          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0

          PC13 BUZZER OUTPUT GPIO(80) LOW
          define HAL_BUZZER_PIN 80
          PC15 LED0 OUTPUT LOW GPIO(90)
          PC14 LED1 OUTPUT LOW GPIO(91)
          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          define AP_NOTIFY_GPIO_LED_2_ENABLED 1
          define DEFAULT_NTF_LED_TYPES 257

          PC8  TIM8_CH3 TIM8 PWM(1)
          PC9  TIM8_CH4 TIM8 PWM(2)
          PA8  TIM1_CH1 TIM1 PWM(3)
          PA9  TIM1_CH2 TIM1 PWM(4)
          PB0  TIM3_CH3 TIM3 PWM(5)
          PB1  TIM3_CH4 TIM3 PWM(6)
          PA10 TIM1_CH3 TIM1 PWM(7)
          PB4  TIM3_CH1 TIM3 PWM(8)
          PB3  TIM2_CH2 TIM2 PWM(9)

          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF

          sed -i '/PA13 LED_BOOTLOADER/d' $TARGET_DIR/hwdef-bl.dat
          sed -i '/PB12 FLASH1_CS/d' $TARGET_DIR/hwdef-bl.dat
          sed -i '/PC14 OSD1_CS/d' $TARGET_DIR/hwdef-bl.dat
          sed -i '/PA4 GYRO1_CS/d' $TARGET_DIR/hwdef-bl.dat
          
          cat >> $TARGET_DIR/hwdef-bl.dat << EOF

          PA4  GYRO1_CS CS
          PB12 OSD1_CS CS
          PA15 FLASH1_CS CS
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF
          
          echo "HAKRC layer locked."

       Moreton: Diagnostics and Resource Verification
      - name: Diagnostics and Resource Verification
        run: |
          echo "===== PA5 ====="
          grep -n "^PA5" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "===== REVISED BOOTLOADER LINES ====="
          cat libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat
          echo "=== VERIFYING FINAL MONOLITHIC SPIDEV LAYOUT ==="
          grep "SPIDEV" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true

      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      - name: Build Bootloader
        run: ./waf bootloader

      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << EOF > $PARM_FILE
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 0
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          RELAY1_PIN -1
          RELAY2_PIN -1
          RELAY3_PIN -1
          RELAY4_PIN -1
          FS_GCS_ENABLE 0
          FS_OPTIONS 1
          RC5_OPTION 153
          RC7_OPTION 65
          EOF
          echo "Production defaults.parm locked."

      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      - name: Build Copter Firmware
        run: ./waf copter -j$(nproc) --verbose

      - name: Collect Firmware Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/production_firmware
          echo "=== EXECUTING ABSOLUTE Monolithic COPY ==="
          find ${{ github.workspace }}/build/FoxeerF405v2 -type f \( -name "*.apj" -o -name "*.bin" -o -name "*.hex" \) -exec cp {} ${{ github.workspace }}/production_firmware/ \;
          echo "=== CONSOLE VISUALIZATION ==="
          ls -lah ${{ github.workspace }}/production_firmware

      - name: Upload HAKRC Production Firmware
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduPilot-Release
          path: ${{ github.workspace }}/production_firmware/
          if-no-files-found: error
