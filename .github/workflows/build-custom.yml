name: Build Custom Production Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Checkout репозитория ArduPilot
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Динамическая генерация и инжекция стерильного профиля HAKRC (Без зависимости от внешних папок)
      - name: Inject Pure HAKRC Hardware Profile
        run: |
          echo "=== GENERATING HAKRC CONFIGURATION DIRECTLY IN WORKFLOW ==="
          
          TARGET_DIR="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2"
          
          # 3.1. Генерация канонического hwdef.dat под стандарты ArduPilot 4.8.0
          cat << 'EOF_HWDEF' > $TARGET_DIR/hwdef.dat
          # Конфігурація плати HAKRCF405V2 на базі STM32F405
          MCU STM32F405xx STM32F405

          # USB дескриптори
          PRODUCT_ID 0x5740
          VENDOR_ID 0x0483

          # Налаштування кристалу та частоти (168MHz)
          OSCILLATOR_HZ 8000000
          STM32_ST_USE_TIMER 5

          # BOARD ID під стандарти ArduPilot 4.8.0
          APJ_BOARD_ID AP_HW_FOXEERF405_V2

          # Налаштування USB портів
          PA11 OTG_FS_DM OTG1
          PA12 OTG_FS_DP OTG1

          # === SPI1 ШИНА ТА ІНІЦІАЛІЗАЦІЯ ГІРОСКОПА (ICM42688P) ===
          PA5  SPI1_SCK  SPI1
          PA6  SPI1_MISO SPI1
          PA7  SPI1_MOSI SPI1
          PA4  GYRO1_CS  CS

          # Апаратне преривання гіроскопа строго на PB10 за Betaflight дампом
          PB10 ICM42688_DRDY INPUT

          # Канонічний синтаксис 4.8.0 для головного IMU
          SPIDEV imu1 SPI1 DEVID1 GYRO1_CS MODE3 8*MHZ
          IMU Invensensev3 SPI:imu1 ROTATION_PITCH_180_YAW_90

          # === SPI2 ШИНА ТА ІНІЦІАЛІЗАЦІЯ MAX7456 OSD (За вашою прозвонкою) ===
          PB13 SPI2_SCK  SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS   CS

          # Двошвидкісний синтаксис 4.8.0 для OSD
          SPIDEV osd SPI2 DEVID1 OSD1_CS MODE0 10*MHZ 10*MHZ

          # === SPI3 ШИНА ТА ІНІЦІАЛІЗАЦІЯ W25Q128 FLASH (За вашою прозвонкою) ===
          PC10 SPI3_SCK  SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS

          # Двошвидкісний синтаксис 4.8.0 для Flash (Знижено до стабільних 40MHz)
          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ 40*MHZ

          # === ШИНА I2C1 (Для барометра DPS310 та компаса QMC5883) ===
          PB8 I2C1_SCL I2C1
          PB9 I2C1_SDA I2C1

          # Реєструємо пристрої
          BARO DPS310 I2C:0:0x76
          COMPASS QMC5883 I2C:0:0x0D

          # === КАРТА UART ПОРТІВ (3-компонентний суворий синтаксис) ===
          PB6  USART1_TX USART1
          PB7  USART1_RX USART1

          PA2  USART2_TX USART2
          PA3  USART2_RX USART2

          PB11 USART3_RX USART3 NODMA

          PC12 UART5_TX UART5
          PD2  UART5_RX UART5

          PC6  USART6_TX USART6
          PC7  USART6_RX USART6

          # === АНАЛОГОВІ ДАТЧИКИ БАТАРЕЇ ADC (Канали 11 та 13) ===
          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)

          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13
          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0

          # === СВЕТОДИОДЫ (Без PINIO та Бузера!) ===
          PC14 LED1 OUTPUT LOW
          PC15 LED0 OUTPUT LOW

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91

          # === КАРТА МОТОРІВ PWM (Таймери TIM8/TIM1/TIM3 строго з Betaflight) ===
          PC8  TIM8_CH3 TIM8 PWM(1)
          PC9  TIM8_CH4 TIM8 PWM(2)
          PA8  TIM1_CH1 TIM1 PWM(3)
          PA9  TIM1_CH2 TIM1 PWM(4)
          PB0  TIM3_CH3 TIM3 PWM(5)
          PB1  TIM3_CH4 TIM3 PWM(6)
          PA10 TIM1_CH3 TIM1 PWM(7)
          PB4  TIM3_CH1 TIM3 PWM(8)
          PB3  TIM2_CH2 TIM2 PWM(9)

          # Повне програмне вимкнення блекбоксу на рівні ядра
          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF_HWDEF

          # 3.2. Генерация hwdef-bl.dat загрузчика
          cat << 'EOF_BL' > $TARGET_DIR/hwdef-bl.dat
          # Налаштування завантажувача для HAKRCF405V2
          MCU STM32F405xx STM32F405

          PRODUCT_ID 0x5740
          VENDOR_ID 0x0483

          OSCILLATOR_HZ 8000000

          PA11 OTG_FS_DM OTG1
          PA12 OTG_FS_DP OTG1

          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF_BL

          # 3.3. Настройка defaults.parm параметров по умолчанию (Без PreArm ошибок)
          cat << 'EOF_PARM' > $TARGET_DIR/defaults.parm
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 0
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2

          # Занулення реле Фоксіра для уникнення PreArm помилок
          RELAY1_PIN -1
          RELAY2_PIN -1
          RELAY3_PIN -1
          RELAY4_PIN -1

          # Виправлення логіки Failsafe GCS під вимоги ArduPilot 4.8.0
          FS_GCS_ENABLE 0
          FS_OPTIONS 1

          # Налаштування тумблерів радіоуправління
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          
          echo "All hardware profiles injected successfully."

      # 4. Сброс кэша и конфигурация загрузчика
      - name: Configure Bootloader
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2 --bootloader

      # 5. Компиляция загрузчика
      - name: Build Bootloader
        run: ./waf bootloader

      # 6. Сброс кэша и конфигурация основной прошивки квадрокоптера
      - name: Configure Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 7. Компиляция основной прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: ./waf copter

      # 8. Тотальный поиск и проверка путей созданной прошивки внутри контейнера
      - name: Debug firmware output
        run: |
          echo "===== ALL APJ IN WORKSPACE ====="
          find ${{ github.workspace }} -name "*.apj" -ls || true

          echo "===== ALL BIN IN WORKSPACE ====="
          find ${{ github.workspace }} -name "*.bin" -ls || true

      # 9. Сбор готовой прошивки в расшаренную хост-директорию с помощью find + exec
      - name: Collect Firmware Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/production_firmware
          echo "=== EXECUTING ABSOLUTE COPY ==="
          find ${{ github.workspace }}/build/FoxeerF405v2 -type f \( -name "*.apj" -o -name "*.bin" -o -name "*.hex" \) -exec cp {} ${{ github.workspace }}/production_firmware/ \;
          echo "=== CONSOLE VISUALIZATION ==="
          ls -lah ${{ github.workspace }}/production_firmware

      # 10. Публикация готовых файлов прошивки HAKRC на сервер GitHub для скачивания
      - name: Upload HAKRC Production Firmware
        uses: actions/upload-artifact@v4
        with:
          name: HAKRC-F405V2-ArduPilot-Release
          path: ${{ github.workspace }}/production_firmware/
          if-no-files-found: error
