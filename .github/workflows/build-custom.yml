name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Завантажуємо чистий код вашого репозиторію з усіма субмодулями ChibiOS
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Хірургічна точкова заміна ресурсів строго за оригінальною структурою FoxeerF405v2
      - name: Modify hwdef.dat for HAKRC
        run: |
          TARGET_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          
          # --- КРОК ОЧИЩЕННЯ ТА ВИВІЛЬНЕННЯ КОНФЛІКТНИХ ПІНІВ (Захист від Redefined) ---
          sed -i '/PB6/d' $TARGET_FILE
          sed -i '/PB7/d' $TARGET_FILE
          sed -i '/PB10/d' $TARGET_FILE
          sed -i '/PB11/d' $TARGET_FILE
          sed -i '/PB12/d' $TARGET_FILE
          sed -i '/PB13/d' $TARGET_FILE
          sed -i '/PC10/d' $TARGET_FILE
          sed -i '/PC11/d' $TARGET_FILE
          sed -i '/PA15/d' $TARGET_FILE
          sed -i '/PC13/d' $TARGET_FILE
          sed -i '/PC14/d' $TARGET_FILE
          sed -i '/PC15/d' $TARGET_FILE
          sed -i '/PB3/d' $TARGET_FILE
          sed -i '/PB4/d' $TARGET_FILE
          sed -i '/PB0/d' $TARGET_FILE
          sed -i '/PB1/d' $TARGET_FILE
          sed -i '/PINIO1/d' $TARGET_FILE
          sed -i '/PINIO2/d' $TARGET_FILE

          # --- 1. UART МУТАЦІЯ (Строго за вашим списком) ---
          sed -i 's/PA10 USART1_RX USART1/PB7  USART1_RX USART1/g' $TARGET_FILE
          sed -i 's/PA9  USART1_TX USART1/PB6  USART1_TX USART1/g' $TARGET_FILE
          sed -i 's/PC10 USART3_TX USART3/PB10 USART3_TX USART3/g' $TARGET_FILE
          sed -i 's/PC11 USART3_RX USART3 NODMA/PB11 USART3_RX USART3 NODMA/g' $TARGET_FILE

          # --- 2. SPI2 ТА SPI3 ПЕРЕПРИЗНАЧЕННЯ НІЖОК ШИН ---
          sed -i 's/PB13 SPI2_SCK SPI2/PB13 SPI2_SCK SPI2/g' # SCK лишається
          sed -i 's/PC2  SPI2_MISO SPI2/PB14 SPI2_MISO SPI2/g'
          sed -i 's/PC3  SPI2_MOSI SPI2/PB15 SPI2_MOSI SPI2/g'
          
          sed -i 's/PB3 SPI3_SCK SPI3/PC10 SPI3_SCK SPI3/g'
          sed -i 's/PB4 SPI3_MISO SPI3/PC11 SPI3_MISO SPI3/g'
          # PB5 SPI3_MOSI SPI3 лишається за замовчуванням

          # --- 3. ЛІНІЇ ВИБОРУ ЧІПА (CS) ---
          sed -i 's/PB12 FLASH1_CS CS/PA15 FLASH1_CS CS/g'
          sed -i 's/PC14 OSD1_CS CS/PB12 OSD1_CS CS/g'

          # --- 4. ШИНИ ДЛЯ ПРИСТРОЇВ SPIDEV (OSD на SPI2, Flash на SPI3) ---
          sed -i 's/SPIDEV dataflash SPI2 DEVID1 FLASH1_CS/SPIDEV dataflash SPI3 DEVID1 FLASH1_CS/g'
          sed -i 's/SPIDEV osd SPI3 DEVID1 OSD1_CS/SPIDEV osd SPI2 DEVID1 OSD1_CS/g'

          # --- 5. ОРІЄНТАЦІЯ IMU ---
          sed -i 's/ROTATION_YAW_180/ROTATION_YAW_90/g' $TARGET_FILE

          # --- 6. БАТАРЕЯ ТА КАНАЛИ АЦП (ADC1) ---
          sed -i 's/PC0 BATT_VOLTAGE_SENS ADC1 SCALE(1)/PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)/g' $TARGET_FILE
          sed -i 's/PC1 BATT_CURRENT_SENS ADC1 SCALE(1)/PC3 BATT_CURRENT_SENS ADC1 SCALE(1)/g' $TARGET_FILE
          
          sed -i 's/define HAL_BATT_VOLT_PIN 10/define HAL_BATT_VOLT_PIN 11/g' $TARGET_FILE
          sed -i 's/define HAL_BATT_CURR_PIN 11/define HAL_BATT_CURR_PIN 13/g' $TARGET_FILE

          # --- 7. БУЗЕР ТА СВІТЛОДІОДИ ---
          sed -i 's/PC15 BUZZER OUTPUT GPIO(80) LOW/PC13 BUZZER OUTPUT GPIO(80) LOW/g' $TARGET_FILE
          sed -i 's/PA13 LED0 OUTPUT LOW GPIO(90)/PC15 LED0 OUTPUT LOW GPIO(90)/g' $TARGET_FILE
          sed -i 's/PA14 LED1 OUTPUT LOW GPIO(91)/PC14 LED1 OUTPUT LOW GPIO(91)/g' $TARGET_FILE

          # --- 8. КАРТА ТАЙМЕРІВ PWM (Збереження унікального синтаксису вашої гілки) ---
          sed -i 's/PA8  TIM1_CH1 TIM1 PWM(1) GPIO(50)/PC8  TIM8_CH3 TIM8 PWM(1) GPIO(50)/g' $TARGET_FILE
          sed -i 's/PC9  TIM8_CH4 TIM8 PWM(2) GPIO(51)/PC9  TIM8_CH4 TIM8 PWM(2) GPIO(51)/g' $TARGET_FILE # Лишається
          sed -i 's/PC8  TIM8_CH3 TIM8 PWM(3) GPIO(52)/PA8  TIM1_CH1 TIM1 PWM(3) GPIO(52)/g' $TARGET_FILE
          sed -i 's/PB15 TIM1_CH3N TIM1 PWM(4) GPIO(53)/PA9  TIM1_CH2 TIM1 PWM(4) GPIO(53)/g' $TARGET_FILE
          sed -i 's/PB6  TIM4_CH1 TIM4 PWM(5) GPIO(54)/PB0  TIM3_CH3 TIM3 PWM(5) GPIO(54)/g' $TARGET_FILE
          sed -i 's/PA15 TIM2_CH1 TIM2 PWM(6) GPIO(55)/PB1  TIM3_CH4 TIM3 PWM(6) GPIO(55)/g' $TARGET_FILE
          sed -i 's/PB11 TIM2_CH4 TIM2 PWM(7) GPIO(56)/PA10 TIM1_CH3 TIM1 PWM(7) GPIO(56)/g' $TARGET_FILE
          sed -i 's/PB10 TIM2_CH3 TIM2 PWM(8) GPIO(57)/PB4  TIM3_CH1 TIM3 PWM(8) GPIO(57)/g' $TARGET_FILE
          
          # Оскільки вихід PB3 TIM2_CH2 PWM(9) у Foxeer міг бути відсутній або прописаний інакше:
          # Ми явно допишемо його в кінець секції PWM, якщо парсер потребує 9-го каналу для серво
          sed -i '/PWM(8)/a PB3  TIM2_CH2 TIM2 PWM(9) GPIO(58)' $TARGET_FILE

          # Виведемо результат модифікації в лог GitHub для повної візуальної перевірки
          echo "=== FINAL PERFECT MODIFIED HWDEF.DAT ==="
          cat $TARGET_FILE

      # 4. Конфігуруємо та збираємо оригінальний завантажувач (Bootloader)
      - name: Build Bootloader
        run: |
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      # 5. Конфігуруємо та збираємо основну прошивку квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: |
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 6. Завантажуємо готові .apj та .bin файли в артефакти GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
