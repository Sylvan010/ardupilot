name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Чистый checkout оригинального репозитория FoxeerF405v2 (100% фабричное состояние)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фикс прав безопасности Git внутри сессии Docker-контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Полное выжигание старых ресурсов и инжекция чистой карты HAKRC под 4.8.0
      - name: Modify Hardware for HAKRC
        run: |
          HW_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          BL_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat"
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          
          # === КРОК 0. ТОТАЛЬНОЕ ВЫЖИГАНИЕ КОНФЛИКТНЫХ ФАБРИЧНЫХ НОГ И АБСТРАКЦИЙ ===
          # Выжигаем все старые упоминания физических пинов SPI, UART, LED, Buzzer и PWM
          sed -i '/PB12/d' $HW_FILE
          sed -i '/PB13/d' $HW_FILE
          sed -i '/PB14/d' $HW_FILE
          sed -i '/PB15/d' $HW_FILE
          
          sed -i '/PC10/d' $HW_FILE
          sed -i '/PC11/d' $HW_FILE
          sed -i '/PB5/d' $HW_FILE
          sed -i '/PA15/d' $HW_FILE
          
          sed -i '/PC13/d' $HW_FILE
          sed -i '/PC14/d' $HW_FILE
          sed -i '/PC15/d' $HW_FILE
          
          sed -i '/PB6/d' $HW_FILE
          sed -i '/PB7/d' $HW_FILE
          sed -i '/PB10/d' $HW_FILE
          sed -i '/PB11/d' $HW_FILE
          
          sed -i '/PC1/d' $HW_FILE
          sed -i '/PC3/d' $HW_FILE
          
          sed -i '/PC8/d' $HW_FILE
          sed -i '/PC9/d' $HW_FILE
          sed -i '/PA8/d' $HW_FILE
          sed -i '/PA9/d' $HW_FILE
          sed -i '/PB0/d' $HW_FILE
          sed -i '/PB1/d' $HW_FILE
          sed -i '/PA10/d' $HW_FILE
          sed -i '/PB4/d' $HW_FILE
          sed -i '/PB3/d' $HW_FILE
          
          # Выжигаем старые SPIDEV, CS и логгер (Универсально, ловит любые табы и регистры Foxeer)
          sed -i '/[Oo][Ss][Dd]/d' $HW_FILE
          sed -i '/[Dd][Aa][Vv][Aa]/d' $HW_FILE
          sed -i '/[Fm][尝][Aa][Uu][Hmg]/d' $HW_FILE
          sed -i '/dataflash/d' $HW_FILE
          sed -i '/osd/d' $HW_FILE
          sed -i '/FLASH1_CS/d' $HW_FILE
          sed -i '/OSD1_CS/d' $HW_FILE
          
          # Вычищаем старые системные макросы, чтобы не было duplicate дефайнов
          sed -i '/HAL_LOGGING_DATAFLASH/d' $HW_FILE
          sed -i '/HAL_GPIO_A_LED_PIN/d' $HW_FILE
          sed -i '/HAL_GPIO_B_LED_PIN/d' $HW_FILE
          sed -i '/HAL_BATT_VOLT_PIN/d' $HW_FILE
          sed -i '/HAL_BATT_CURR_PIN/d' $HW_FILE
          sed -i '/FLASH_SIZE_KB/d' $HW_FILE
          sed -i '/FLASH_RESERVE_START_KB/d' $HW_FILE
          sed -i '/FLASH_BOOTLOADER_LOAD_KB/d' $HW_FILE
          
          # Стираем старый светодиод из загрузчика (Bootloader LED)
          sed -i '/PA13 LED_BOOTLOADER/d' $BL_FILE

          # === КРОК 1. ИНЖЕКЦИЯ СИСТЕМНЫХ НАСТРОЕК ПАМЯТИ (Для Auto Mission в 4.8.0) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC FIXED MEMORY LAYOUT ===
          FLASH_SIZE_KB 1024
          FLASH_RESERVE_START_KB 48
          FLASH_BOOTLOADER_LOAD_KB 48
          EOF

          # === КРОК 2. ИНЖЕКЦИЯ ЧИСТОЙ КАРТЫ SPI И ПРИСТРОЕВ (Строго по вашей прозвонке) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 SPI FINAL MAP ===
          PC10 SPI3_SCK SPI3
          PC11 SPI3_MISO SPI3
          PB5  SPI3_MOSI SPI3
          PA15 FLASH1_CS CS

          PB13 SPI2_SCK SPI2
          PB14 SPI2_MISO SPI2
          PB15 SPI2_MOSI SPI2
          PB12 OSD1_CS CS

          SPIDEV dataflash SPI3 DEVID1 FLASH1_CS MODE3 40*MHZ
          SPIDEV osd       SPI2 DEVID1 OSD1_CS MODE0 10*MHZ
          EOF

          # === КРОК 3. ИНЖЕКЦИЯ ЧИСТОЙ КАРТЫ UART (Двухкомпонентный синтаксис 4.8.0 для UART5) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC F405 V2 VERIFIED UART MAP ===
          PB6  USART1_TX USART1
          PB7  USART1_RX USART1

          PA2  USART2_TX USART2
          PA3  USART2_RX USART2

          PB10 USART3_TX USART3
          PB11 USART3_RX USART3 NODMA

          PA0  UART4_TX UART4
          PA1  UART4_RX UART4

          PC12 UART5_TX
          PD2  UART5_RX

          PC6  USART6_TX USART6
          PC7  USART6_RX USART6
          EOF

          # === КРОК 4. ИНЖЕКЦИЯ СИСТЕМНЫХ СВЕТОДИОДОВ И AP_NOTIFY ===
          cat >> $HW_FILE <<EOF

          # === HAKRC SYSTEM LEDs ===
          PC15 LED0 OUTPUT LOW
          PC14 LED1 OUTPUT LOW

          define HAL_GPIO_A_LED_PIN 90
          define HAL_GPIO_B_LED_PIN 91
          define AP_NOTIFY_GPIO_LED_2_ENABLED 1
          define DEFAULT_NTF_LED_TYPES 257
          EOF

          # === КРОК 5. ИНЖЕКЦИЯ АППАРАТНОГО БУЗЕРА HAKRC ===
          cat >> $HW_FILE <<EOF

          # === HAKRC BUZZER ===
          PC13 BUZZER OUTPUT GPIO(80) LOW
          define HAL_BUZZER_PIN 80
          EOF

          # === КРОК 6. АНАЛОГОВЫЕ ДАТЧИКИ БАТАРЕИ (ADC Канали 11 та 13) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC ANALOG ADC SENSORS ===
          PC1 BATT_VOLTAGE_SENS ADC1 SCALE(1)
          PC3 BATT_CURRENT_SENS ADC1 SCALE(1)
          define HAL_BATT_VOLT_PIN 11
          define HAL_BATT_CURR_PIN 13
          define HAL_BATT_VOLT_SCALE 10.0
          define HAL_BATT_CURR_SCALE 100.0
          EOF

          # === КРОК 7. ПОЛНАЯ КАРТА ДВИГАТЕЛЕЙ PWM (Таймеры TIM8/TIM1/TIM3 строго из Betaflight) ===
          cat >> $HW_FILE <<EOF

          # === HAKRC PWM MOTOR OUTPUTS ===
          PC8  TIM8_CH3 TIM8 PWM(1) GPIO(50)
          PC9  TIM8_CH4 TIM8 PWM(2) GPIO(51)
          PA8  TIM1_CH1 TIM1 PWM(3) GPIO(52)
          PA9  TIM1_CH2 TIM1 PWM(4) GPIO(53)
          PB0  TIM3_CH3 TIM3 PWM(5) GPIO(54)
          PB1  TIM3_CH4 TIM3 PWM(6) GPIO(55)
          PA10 TIM1_CH3 TIM1 PWM(7) GPIO(56)
          PB4  TIM3_CH1 TIM3 PWM(8) GPIO(57)
          PB3  TIM2_CH2 TIM2 PWM(9) GPIO(58)
          EOF

          # === КРОК 8. ПРОГРАММНОЕ ОТКЛЮЧЕНИЕ BLACKBOX ЛОГГЕРА ===
          cat >> $HW_FILE <<EOF

          # === HAKRC DISABLE LOGGING BACKEND ===
          define HAL_LOGGING_DATAFLASH_ENABLED 0
          define HAL_LOGGING_MAVLINK_ENABLED 0
          EOF

          # === КРОК 9. ОВЕРРАЙД СВЕТОДИОДА ЗАВАНТАЖУВАЧА (Bootloader LED на PC15) ===
          cat >> $BL_FILE <<EOF

          # --- HAKRC Bootloader Overrides ---
          PC15 LED_BOOTLOADER OUTPUT LOW
          define HAL_LED_ON 0
          EOF

          echo "=== STEP 2: TOTAL CLEAN & MONOLITHIC INJECTION COMPLETED ==="

      # 4. Тестовый проход конфигурации (Проверяем отсутствие коллизий и синтаксис портов)
      - name: Configure Target Test
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      # 5. Глубокий контроль успешности генерации аппаратного графа ChibiOS
      - name: Check Generated Hardware h-Files
        run: |
          echo "=== VERIFYING GENERATED HEADERS ==="
          test -f build/FoxeerF405v2/hwdef.h
          grep -R "OSD1_CS" build/FoxeerF405v2/ || true
          grep -R "FLASH1_CS" build/FoxeerF405v2/ || true
          echo "Success! The ChibiOS generator configuration step passed successfully."

      # 6. Збірка завантажувача (Bootloader)
      - name: Build Bootloader
        run: ./waf bootloader

      # 7. Настройка defaults.parm под ядро 4.8.0 (Включаем OSD, тушим блекбокс, настраиваем RC опции тумблеров)
      - name: Write Production defaults.parm
        run: |
          PARM_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/defaults.parm"
          cat << 'EOF_PARM' > $PARM_FILE
          # Production parameters for HAKRCF405V2 Layout (ArduPilot 4.8.0 Specification)
          BATT_MONITOR 4
          BATT_VOLT_PIN 11
          BATT_CURR_PIN 13
          BATT_VOLT_MULT 10.0
          BATT_AMP_PERVLT 100.0
          OSD_TYPE 1
          LOG_BACKEND_TYPE 1
          NTF_LED_TYPES 257
          NTF_LED_BRIGHT 2
          
          # Современные опции тумблеров радиоуправления ArduPilot 4.8.0
          RC5_OPTION 153
          RC7_OPTION 65
          EOF_PARM
          echo "Production defaults.parm locked."

      # 8. Збірка основної прошивки квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 9. Експортуємо готові .apj та .bin файли в артефакти запуску GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
