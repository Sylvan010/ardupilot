name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Завантажуємо чистий код вашого репозиторію з усіма субмодулями ChibiOS
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Хірургічна точкова заміна ресурсів поверх оригінального FoxeerF405v2
      - name: Modify hwdef.dat for HAKRC
        run: |
          TARGET_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          
          # --- UART Mapping ---
          sed -i 's/PA9  USART1_TX USART1/PB6  USART1_TX USART1/g' $TARGET_FILE
          sed -i 's/PA10 USART1_RX USART1/PB7  USART1_RX USART1/g' $TARGET_FILE
          sed -i 's/PC10 USART3_TX USART3/PB10 USART3_TX USART3/g' $TARGET_FILE
          sed -i 's/PC11 USART3_RX USART3/PB11 USART3_RX USART3/g' $TARGET_FILE

          # --- SPI2 (OSD MAX7456) ---
          sed -i 's/PC14 OSD_CS CS/PB12 OSD_CS CS/g' $TARGET_FILE

          # --- SPI3 (Flash) ---
          sed -i 's/PB3  SPI3_SCK SPI3/PC10 SPI3_SCK SPI3/g' $TARGET_FILE
          sed -i 's/PB4  SPI3_MISO SPI3/PC11 SPI3_MISO SPI3/g' $TARGET_FILE
          sed -i 's/PB12 FLASH_CS CS/PA15 FLASH_CS CS/g' $TARGET_FILE

          # --- IMU Rotation ---
          sed -i 's/ROTATION_YAW_180/ROTATION_YAW_90/g' $TARGET_FILE

          # --- ADC ---
          sed -i 's/PC0 ADC_BAT VOLTAGE_ADC/PC1 ADC_BAT VOLTAGE_ADC/g' $TARGET_FILE
          sed -i 's/PC1 ADC_CURR CURRENT_ADC/PC3 ADC_CURR CURRENT_ADC/g' $TARGET_FILE
          sed -i 's/define HAL_BATT_VOLT_PIN 0/define HAL_BATT_VOLT_PIN 1/g' $TARGET_FILE
          sed -i 's/define HAL_BATT_CURR_PIN 1/define HAL_BATT_CURR_PIN 3/g' $TARGET_FILE

          # --- LED / Buzzer ---
          sed -i 's/PA13 LED1 OUTPUT HIGH/PC14 LED1 OUTPUT HIGH/g' $TARGET_FILE
          sed -i 's/PA14 LED2 OUTPUT HIGH/PC15 LED2 OUTPUT HIGH/g' $TARGET_FILE
          sed -i 's/PC15 BUZZER OUTPUT HIGH/PC13 BUZZER OUTPUT HIGH/g' $TARGET_FILE

          # --- Видалення старого PINIO (щоб уникнути конфліктів) ---
          sed -i '/PINIO1 OUTPUT/d' $TARGET_FILE

          # --- PWM Timer Mapping (Строго за Betaflight Дампом) ---
          sed -i 's/PA8  TIM1_CH1  PWM1 Motor/PC8  TIM8_CH3  PWM1 Motor/g' $TARGET_FILE
          sed -i 's/PC9  TIM3_CH4  PWM2 Motor/PC9  TIM8_CH4  PWM2 Motor/g' $TARGET_FILE
          sed -i 's/PC8  TIM3_CH3  PWM3 Motor/PA8  TIM1_CH1  PWM3 Motor/g' $TARGET_FILE
          sed -i 's/PB15 TIM1_CH3N PWM4 Motor/PA9  TIM1_CH2  PWM4 Motor/g' $TARGET_FILE
          sed -i 's/PB6  TIM4_CH1  PWM5 Motor/PB0  TIM3_CH3  PWM5 Motor/g' $TARGET_FILE
          sed -i 's/PA15 TIM2_CH1  PWM6 Motor/PB1  TIM3_CH4  PWM6 Motor/g' $TARGET_FILE
          sed -i 's/PB11 TIM2_CH4  PWM7 Motor/PA10 TIM1_CH3  PWM7 Motor/g' $TARGET_FILE
          sed -i 's/PB10 TIM2_CH3  PWM8 Motor/PB4  TIM3_CH1  PWM8 Motor/g' $TARGET_FILE
          sed -i 's/PB1  TIM3_CH4  PWM9 Servo/PB3  TIM2_CH2  PWM9 Servo/g' $TARGET_FILE

          # Виведемо результат модифікації в лог GitHub для візуальної перевірки
          echo "=== MODIFIED HWDEF.DAT ==="
          cat $TARGET_FILE

      # 4. Конфігуруємо та збираємо оригінальний завантажувач (Bootloader)
      - name: Build Bootloader
        run: |
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      # 5. Конфігуруємо та збираємо основну прошивку квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: |
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 6. Завантажуємо готові .apj та .bin файли в артефакти GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
