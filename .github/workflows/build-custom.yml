name: Build Custom Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:latest

    steps:
      # 1. Завантажуємо чистий код вашого репозиторію з усіма субмодулями ChibiOS
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. Фікс прав безпеки Git всередині сесії Docker контейнера
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 3. Хірургічна точкова заміна ресурсів поверх оригінального FoxeerF405v2
      - name: Modify hwdef.dat for HAKRC
        run: |
          TARGET_FILE="libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat"
          
          # --- КРОК ОЧИЩЕННЯ (Видаляємо старі рядки з ніжками HAKRC, щоб уникнути Redefined помилок) ---
          sed -i '/PB6/d' $TARGET_FILE
          sed -i '/PB7/d' $TARGET_FILE
          sed -i '/PB10/d' $TARGET_FILE
          sed -i '/PB11/d' $TARGET_FILE
          sed -i '/PB12/d' $TARGET_FILE
          sed -i '/PB13/d' $TARGET_FILE
          sed -i '/PB14/d' $TARGET_FILE
          sed -i '/PB15/d' $TARGET_FILE
          sed -i '/PA15/d' $TARGET_FILE
          sed -i '/PC1/d' $TARGET_FILE
          sed -i '/PC3/d' $TARGET_FILE
          sed -i '/PC10/d' $TARGET_FILE
          sed -i '/PC11/d' $TARGET_FILE
          sed -i '/PB5/d' $TARGET_FILE
          sed -i '/PC13/d' $TARGET_FILE
          sed -i '/PC14/d' $TARGET_FILE
          sed -i '/PC15/d' $TARGET_FILE
          sed -i '/PC8/d' $TARGET_FILE
          sed -i '/PC9/d' $TARGET_FILE
          sed -i '/PA8/d' $TARGET_FILE
          sed -i '/PA9/d' $TARGET_FILE
          sed -i '/PA10/d' $TARGET_FILE
          sed -i '/PB0/d' $TARGET_FILE
          sed -i '/PB1/d' $TARGET_FILE
          sed -i '/PB3/d' $TARGET_FILE
          sed -i '/PB4/d' $TARGET_FILE
          sed -i '/PINIO1/d' $TARGET_FILE
          sed -i '/PINIO2/d' $TARGET_FILE

          # --- КРОК ЗАПИСУ НОВОГО МАПІНГУ HAKRC ---
          # Вставляємо нові ресурси одразу після SERIAL_ORDER, щоб зберегти структуру
          sed -i '/SERIAL_ORDER/a \
          \
          # --- HAKRC-F405V2 CUSTOM RESOURCE MAPPING --- \
          PB6  USART1_TX USART1 \
          PB7  USART1_RX USART1 \
          PA2  USART2_TX USART2 \
          PA3  USART2_RX USART2 \
          PC0  SBUS_INVERT OUTPUT LOW \
          PB10 USART3_TX USART3 \
          PB11 USART3_RX USART3 \
          PA0  UART4_TX UART4 \
          PA1  UART4_RX UART4 \
          PC12 UART5_TX UART5 \
          PD2  UART5_RX UART5 \
          PC6  USART6_TX USART6 \
          PC7  USART6_RX USART6 \
          PB13 SPI2_SCK SPI2 \
          PB14 SPI2_MISO SPI2 \
          PB15 SPI2_MOSI SPI2 \
          PB12 OSD_CS CS \
          PC10 SPI3_SCK SPI3 \
          PC11 SPI3_MISO SPI3 \
          PB5  SPI3_MOSI SPI3 \
          PA15 FLASH_CS CS \
          PC1 ADC_BAT ADC1 \
          PC3 ADC_CURR ADC1 \
          PC14 LED1 OUTPUT HIGH \
          PC15 LED2 OUTPUT HIGH \
          PC13 BUZZER OUTPUT HIGH \
          PC8  TIM8_CH3  PWM(1) \
          PC9  TIM8_CH4  PWM(2) \
          PA8  TIM1_CH1  PWM(3) \
          PA9  TIM1_CH2  PWM(4) \
          PB0  TIM3_CH3  PWM(5) \
          PB1  TIM3_CH4  PWM(6) \
          PA10 TIM1_CH3  PWM(7) \
          PB4  TIM3_CH1  PWM(8) \
          PB3  TIM2_CH2  PWM(9)' $TARGET_FILE

          # --- КРОК КОРЕКЦІЇ СИСТЕМНИХ ДЕФАЙНІВ ---
          sed -i 's/ROTATION_YAW_180/ROTATION_YAW_90/g' $TARGET_FILE
          sed -i 's/define HAL_BATT_VOLT_PIN 0/define HAL_BATT_VOLT_PIN 11/g' $TARGET_FILE
          sed -i 's/define HAL_BATT_CURR_PIN 1/define HAL_BATT_CURR_PIN 13/g' $TARGET_FILE

          # Виведемо результат модифікації в лог GitHub для візуальної перевірки
          echo "=== FINAL MODIFIED HWDEF.DAT ==="
          cat $TARGET_FILE

      # 4. Конфігуруємо та збираємо оригінальний завантажувач (Bootloader)
      - name: Build Bootloader
        run: |
          ./waf configure --board FoxeerF405v2 --bootloader
          ./waf bootloader

      # 5. Конфігуруємо та збираємо основну прошивку квадрокоптера (ArduCopter)
      - name: Build Copter Firmware
        run: |
          ./waf configure --board FoxeerF405v2
          ./waf copter

      # 6. Завантажуємо готові .apj та .bin файли в артефакти GitHub
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoxeerF405v2-HAKRC-Firmware
          path: |
            build/FoxeerF405v2/bin/arducopter.apj
            build/FoxeerF405v2/bin/bootloader.bin
