name: Build Custom Foxeer-HAKRC Firmware

on:
  push:
    branches:
      - main
      - master
      - Copter-4.8.0
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Official ArduPilot Toolchain
      run: |
        # Використовуємо офіційний скрипт ArduPilot для встановлення GCC ARM та Python-залежностей
        USER=root Tools/environment_install/install-prereqs-ubuntu.sh -y
        # Перезавантажуємо змінні оточення, щоб Waf побачив компилятор
        echo "$HOME/opt/gcc-arm-none-eabi-10-2020-q4-major/bin" >> $GITHUB_PATH

    - name: Build Bootloader
      run: |
        ./waf distclean
        ./waf configure --board FoxeerF405v2 --bootloader
        ./waf bootloader

    - name: Build ArduCopter Firmware
      run: |
        ./waf distclean
        ./waf configure --board FoxeerF405v2
        ./waf copter

    - name: Upload Artifacts (Node 24 / Modern Engine)
      uses: actions/upload-artifact@v6
      with:
        name: Custom-HAKRC-Firmware
        path: |
          build/FoxeerF405v2/bin/FoxeerF405v2_bl.hex
          build/FoxeerF405v2/bin/arducopter.apj
