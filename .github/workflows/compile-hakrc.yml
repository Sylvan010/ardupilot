name: Build Custom Foxeer-HAKRC Firmware

on:
  push:
    branches:
      - master
      - Copter-4.8.0
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install ARM Toolchain
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          gdb-multiarch \
          make \
          git \
          python3-pip \
          python3-dev \
          python3-setuptools \
          python3-wheel \
          libtool \
          pkg-config \
          rsync \
          zip \
          unzip

        pip3 install --upgrade pip
        pip3 install empy==3.3.4 future pexpect jinja2

    - name: Verify Toolchain
      run: |
        which arm-none-eabi-gcc
        which arm-none-eabi-g++
        which arm-none-eabi-ar
        which arm-none-eabi-objcopy
        which arm-none-eabi-size
        which arm-none-eabi-nm

        arm-none-eabi-gcc --version
        arm-none-eabi-ar --version

    - name: Configure Bootloader
      run: |
        ./waf distclean
        ./waf configure --board FoxeerF405v2 --bootloader

    - name: Build Bootloader
      run: |
        ./waf bootloader -j$(nproc)

    - name: Configure Copter
      run: |
        ./waf distclean
        ./waf configure --board FoxeerF405v2

    - name: Build Copter
      run: |
        ./waf copter -j$(nproc)

    - name: Show Build Files
      run: |
        find build/FoxeerF405v2 -type f

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: FoxeerF405v2-HAKRC
        path: |
          build/FoxeerF405v2/bin/*.apj
          build/FoxeerF405v2/bin/*.hex
          build/FoxeerF405v2/bin/*.bin
