name: Build Custom HAKRC F405V2 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:v0.1.0
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # ВАШ ШАГ ЖЕСТКОЙ ПРОВЕРКИ В ЛОГАХ ACTIONS
      - name: Check APJ_BOARD_ID
        run: |
          echo "===== CURRENT HWDEF ====="
          grep -n "APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat
          echo "===== SEARCH 5055 ====="
          grep -R "5055" libraries/AP_HAL_ChibiOS/hwdef/ || true

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      - name: Configure Board
        run: |
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      - name: Build Copter Firmware
        run: ./waf copter --bootloader -j$(nproc)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arducopter-hakrc-f405v2
          path: build/FoxeerF405v2/bin/arducopter.apj
          if-no-files-found: error
