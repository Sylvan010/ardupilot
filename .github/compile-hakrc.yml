name: Build Custom HAKRC F405V2 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:v0.1.0
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # КОВРОВАЯ ЗАЧИСТКА: ВЫРЕЗАЕМ 5055 ИЗ ВСЕХ ДИРЕКТОРИЙ ВООБЩЕ
      - name: Carpet Bombing of 5055 ID
        run: |
          echo "=== 1. Ищем, в каких файлах на сервере реально прячется 5055 ==="
          find libraries/AP_HAL_ChibiOS/hwdef/ -type f -exec grep -l "5055" {} \; || true
          
          echo "=== 2. Принудительно заменяем 5055 на текст абсолютно везде ==="
          find libraries/AP_HAL_ChibiOS/hwdef/ -type f -exec sed -i 's/APJ_BOARD_ID 5055/APJ_BOARD_ID AP_HW_FOXEERF405_V2/g' {} \;
          find libraries/AP_HAL_ChibiOS/hwdef/ -type f -exec sed -i 's/5055/AP_HW_FOXEERF405_V2/g' {} \;
          
          echo "=== 3. Дополнительно заменяем старый ID 1025 на текст везде ==="
          find libraries/AP_HAL_ChibiOS/hwdef/ -type f -exec sed -i 's/APJ_BOARD_ID 1025/APJ_BOARD_ID AP_HW_FOXEERF405_V2/g' {} \;
          
          echo "=== 4. Полностью удаляем любые возможные кастомные папки-призраки ==="
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/HAKRC*/
          rm -rf libraries/AP_HAL_ChibiOS/hwdef/hakrc*/
          
          echo "=== 5. Проверяем, что осталось в FoxeerF405v2 ==="
          grep "APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true

      - name: Clean and Configure Board
        run: |
          rm -rf build/
          rm -rf .waf*
          ./waf distclean
          ./waf configure --board FoxeerF405v2

      - name: Build Copter Firmware
        run: ./waf copter --bootloader -j$(nproc)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arducopter-hakrc-f405v2
          path: build/FoxeerF405v2/bin/arducopter.apj
          if-no-files-found: error
