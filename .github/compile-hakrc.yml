name: Build Custom HAKRC F405V2 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    container:
      image: ardupilot/ardupilot-dev-chibios:v0.1.0
      options: --user root

    steps:
      # 1. Чекаут із вимкненим кешуванням глибини (fetch-depth: 0 за вашою порадою)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # 2. ВАШ ШАГ ЖОРСТКОЇ ВЕРИФІКАЦІЇ ДЖЕРЕЛА
      - name: Verify source
        run: |
          echo "=========================================="
          echo "REAL SERVER COMMIT SHA:"
          git rev-parse HEAD
          echo "=========================================="
          echo "BOARD ID IN hwdef.dat:"
          grep -n "APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef.dat || true
          echo "=========================================="
          echo "BOARD ID IN hwdef-bl.dat:"
          grep -n "APJ_BOARD_ID" libraries/AP_HAL_ChibiOS/hwdef/FoxeerF405v2/hwdef-bl.dat || true
          echo "=========================================="
          echo "GLOBAL SEARCH FOR OCCURRENCES OF '5055':"
          grep -rn "5055" libraries/AP_HAL_ChibiOS/hwdef/ || true
          echo "=========================================="

      # 3. ВАШ ШАГ ПРИМУСОВОЇ ОЧИСТКИ КЕШУ WAF
      - name: Clean build
        run: |
          rm -rf build
          rm -rf .waf*
          ./waf distclean

      - name: Configure Board
        run: ./waf configure --board FoxeerF405v2

      - name: Build Copter Firmware
        run: ./waf copter --bootloader -j$(nproc)

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arducopter-hakrc-f405v2
          path: build/FoxeerF405v2/bin/arducopter.apj
          if-no-files-found: error
